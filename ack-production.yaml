        Fn::Sub:
          - |
            apiVersion: agents.kruise.io/v1alpha1
            kind: SandboxSet
            metadata:
              name: openclaw-advanced
              namespace: ${SandboxNamespace}
            spec:
              persistentContents:
                - filesystem
              replicas: 0
              runtimes:
                - name: csi
                - name: agent-runtime
              template:
                metadata:
                  labels:
                    app: openclaw
                    alibabacloud.com/acs: "true"
                    alibabacloud.com/compute-class: agent-sandbox
                  annotations:
                    image.alibabacloud.com/enable-image-cache: "true"
                    network.alibabacloud.com/vswitch-ids: "${OpenClawVSwitchIds}"
                    network.alibabacloud.com/security-group-ids: "${OpenClawIsolationSecurityGroupId}"
                    network.alibabacloud.com/network-policy-mode: "traffic-policy"
                    network.alibabacloud.com/enable-network-policy-agent: "true"
                spec:
                  automountServiceAccountToken: false
                  enableServiceLinks: false
                  hostNetwork: false
                  hostPID: false
                  hostIPC: false
                  shareProcessNamespace: false
                  hostname: openclaw
                  containers:
                    - name: sandbox
                      image: "${OpenClawImage}"
                      securityContext:
                        readOnlyRootFilesystem: false
                        runAsUser: 0
                        runAsGroup: 0
                      command: ["bash", "-c"]
                      args:
                        - "${CmsGatewayStartScript}"
                      ports:
                        - name: gateway
                          containerPort: 18789
                          protocol: TCP
                        - name: runtime
                          containerPort: 49983
                          protocol: TCP
                      env:
                        - name: OPENCLAW_CONFIG_DIR
                          value: /root/.openclaw
                        - name: KUBERNETES_SERVICE_PORT_HTTPS
                          value: ""
                        - name: KUBERNETES_SERVICE_PORT
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP_PROTO
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP_ADDR
                          value: ""
                        - name: KUBERNETES_SERVICE_HOST
                          value: ""
                        - name: KUBERNETES_PORT
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP_PORT
                          value: ""
                      resources:
                        requests:
                          cpu: 2
                          memory: 4Gi
                        limits:
                          cpu: 2
                          memory: 4Gi
                      startupProbe:
                        exec:
                          command:
                            - node
                            - -e
                            - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
                        initialDelaySeconds: 1
                        periodSeconds: 2
                        failureThreshold: 150
                      imagePullPolicy: IfNotPresent
                  terminationGracePeriodSeconds: 1
          - SandboxNamespace:
              Ref: SandboxNamespace
            OpenClawImage:
              Ref: OpenClawImage
            CmsGatewayStartScript:
              Fn::If:
                - EnableCmsObservabilityCondition
                - Fn::Sub:
                    - |
                      wget -qO- https://arms-apm-cn-hangzhou-pre.oss-cn-hangzhou.aliyuncs.com/openclaw-cms-plugin/install-wget-nest.sh | bash -s -- --endpoint ${Endpoint} --x-arms-license-key ${LicenseKey} --x-arms-project ${ArmsProject} --x-cms-workspace ${WorkspaceName} --serviceName ${ServiceName} || true && exec node openclaw.mjs gateway run --allow-unconfigured
                    - LicenseKey:
                        Fn::Jq:
                          - First
                          - .AuthToken
                          - Fn::GetAtt:
                              - CmsServiceObservability
                              - EntryPointInfo
                      ArmsProject:
                        Fn::Jq:
                          - First
                          - .Project
                          - Fn::GetAtt:
                              - CmsServiceObservability
                              - EntryPointInfo
                      WorkspaceName:
                        Ref: CmsWorkspaceName
                      ServiceName:
                        Ref: CmsServiceName
                      Endpoint:
                        Fn::Sub:
                          - 'https://${ArmsProject}.${RegionId}.log.aliyuncs.com/apm/trace/opentelemetry'
                          - RegionId:
                              Ref: ALIYUN::Region
                            ArmsProject:
                              Fn::Jq:
                                - First
                                - .Project
                                - Fn::GetAtt:
                                    - CmsServiceObservability
                                    - EntryPointInfo
                - |
                  exec node openclaw.mjs gateway run --allow-unconfigured
            OpenClawVSwitchIds:
              Fn::GetAtt:
                - VpcModule
                - OpenClawVSwitchIds
            OpenClawIsolationSecurityGroupId:
              Fn::GetAtt:
                - OpenClawIsolationSecurityGroup
                - SecurityGroupId
  EditAlbConfigServiceAccount:
    Type: ALIYUN::CS::ClusterApplication
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: 'edit-alb-config-sa'
          namespace: "sandbox-system"
  EditAlbConfigRole:
    Type: ALIYUN::CS::ClusterApplication
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: 'edit-alb-config-role'
          namespace: "sandbox-system"
        rules:
        - apiGroups: ["alibabacloud.com"]
          resources: ["albconfigs"]
          verbs: ["get", "list", "update","patch"]
  EditAlbConfigBinding:
    Type: ALIYUN::CS::ClusterApplication
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: "edit-alb-config-rolebinding"
          namespace: "sandbox-system"
        subjects:
        - kind: ServiceAccount
          name: 'edit-alb-config-sa'
          namespace: "sandbox-system"
        roleRef:
          kind: ClusterRole
          name: 'edit-alb-config-role'
          apiGroup: rbac.authorization.k8s.io
  # ========== ALB Config Job（配置 HTTPS 443 监听器） ==========
  EditAlbConfigJob:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn:
      - AddonSleep
      - EditAlbConfigBinding
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: edit-alb-config-job
        spec:
          template:
            metadata:
              name: edit-alb-config-job
            spec:
              serviceAccountName: edit-alb-config-sa
              restartPolicy: Never
              containers:
              - name: edit-alb-config-job
                image: compute-nest-registry.cn-hangzhou.cr.aliyuncs.com/public/dtzar/helm-kubectl:3.12.0
                command: [ "/bin/sh", "-c", "--" ]
                args:
                  - |
                    set -x
                    echo "开始修改 AlbConfig 资源：alb"
                    kubectl patch albconfig.alibabacloud.com alb --type='json' -p='[{"op":"add","path":"/spec/listeners/-","value":{"port":443,"protocol":"HTTPS","requestTimeout":600}}]'
  # ========== 测试 Pod ==========
  TestPod:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn:
      - OpenClawSandboxSet
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace:
        Ref: SandboxNamespace
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: v1
            kind: Pod
            metadata:
              name: acs-sandbox-test-pod
              namespace: ${SandboxNamespace}
              labels:
                app: acs-sandbox-test-pod
                alibabacloud.com/acs: "true"
            spec:
              nodeSelector:
                type: virtual-kubelet
              tolerations:
                - key: virtual-kubelet.io/provider
                  operator: Exists
                  effect: NoSchedule
              containers:
                - name: acs-sandbox-test-pod
                  image: {{ computenest::acrimage::acs-sandbox-test-pod }}
                  imagePullPolicy: Always
                  env:
                    - name: E2B_API_KEY
                      value: ${AdminApiKey}
                    - name: E2B_DOMAIN
                      value: ${E2BDomainAddress}
                    - name: SSL_CERT_FILE
                      value: "${TLSCert}"
              restartPolicy: Never
          - SandboxNamespace:
              Ref: SandboxNamespace
            AdminApiKey:
              Ref: AdminApiKey
            E2BDomainAddress:
              Ref: E2BDomainAddress
            TLSCert:
              Ref: TLSCert
  # ========== PrivateZone — NewVPC 场景：创建全新 Zone ==========
  PrivateZone:
    Condition: EnablePrivateZoneForNewVpcCondition
    Type: ALIYUN::PVTZ::Zone
    DependsOn: VpcModule
    Properties:
      ProxyPattern: ZONE
      ZoneName:
        Ref: E2BDomainAddress
  PrivateZoneVpcBinder:
    Condition: EnablePrivateZoneForNewVpcCondition
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    Properties:
      Vpcs:
        - RegionId:
            Ref: ALIYUN::Region
          VpcId:
            Fn::GetAtt:
              - VpcModule
              - VpcId
      ZoneId:
        Fn::GetAtt:
          - PrivateZone
          - ZoneId
  PrivateZoneCnameRecord:
    Condition: EnablePrivateZoneForNewVpcCondition
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn:
      - PrivateZoneVpcBinder
      - AlbDataSource
    Properties:
      ZoneId:
        Fn::GetAtt:
          - PrivateZone
          - ZoneId
      Rr: '*'
      Type: CNAME
      Value:
        Fn::Jq:
          - First
          - '.[0].DNSName'
          - Fn::GetAtt:
              - AlbDataSource
              - LoadBalancers
  # ========== PrivateZone — ExistingVPC + 无同名 Zone：创建新 Zone + 绑定 VPC + CNAME ==========
  # 通过 Locals DATASOURCE::PVTZ::Zones 查询账号下所有 Zone，Eval 计算是否有同名 Zone
  # ExistingVpcNeedNewZoneCondition = EnablePrivateZone=true AND ExistingVPC AND 无同名 Zone
  PrivateZoneForExistingVpc:
    Condition: ExistingVpcNeedNewZoneCondition
    Type: ALIYUN::PVTZ::Zone
    Properties:
      ProxyPattern: ZONE
      ZoneName:
        Ref: E2BDomainAddress
  PrivateZoneVpcBinderForExistingVpc:
    Condition: ExistingVpcNeedNewZoneCondition
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    Properties:
      Vpcs:
        - RegionId:
            Ref: ALIYUN::Region
          VpcId:
            Ref: VpcId
      ZoneId:
        Fn::GetAtt:
          - PrivateZoneForExistingVpc
          - ZoneId
  ExistingVpcNewZoneCnameRecord:
    Condition: ExistingVpcNeedNewZoneCondition
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn:
      - PrivateZoneVpcBinderForExistingVpc
      - AlbDataSource
    Properties:
      ZoneId:
        Fn::GetAtt:
          - PrivateZoneForExistingVpc
          - ZoneId
      Rr: '*'
      Type: CNAME
      Value:
        Fn::Jq:
          - First
          - '.[0].DNSName'
          - Fn::GetAtt:
              - AlbDataSource
              - LoadBalancers
  # ========== PrivateZone — ExistingVPC + 已有同名 Zone：复用已有 ZoneId ==========
  # ExistingVpcReuseZoneCondition = EnablePrivateZone=true AND ExistingVPC AND 有同名 Zone
  # ZoneId 来自 Locals 中的 ExistingPrivateZoneId（通过 Fn::Jq 从 DATASOURCE 查询结果提取）
  # 因为 ExistingVpcZonesLocal 已通过 VpcId 过滤，查到的 Zone 一定已绑定该 VPC
  # 所以无需再执行 ZoneVpcBinder，直接添加 CNAME 记录即可
  ExistingVpcReuseZoneCnameRecord:
    Condition: ExistingVpcReuseZoneCondition
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn:
      - AlbDataSource
    Properties:
      ZoneId:
        Ref: ExistingPrivateZoneId
      Rr: '*'
      Type: CNAME
      Value:
        Fn::Jq:
          - First
          - '.[0].DNSName'
          - Fn::GetAtt:
              - AlbDataSource
              - LoadBalancers
