    Required: true
    Default: NewVPC
  SnatEntry:
    Type: Boolean
    Default: true
    AllowedValues:
      - true
      - false
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - ${VpcOption}
            - ExistingVPC
    Label:
      zh-cn: 是否打开snat
      en: set snat
    Description:
      zh-cn: VPC如果具备公网访问能力请设置为false
      en: If the VPC has public network access, set it to false
  ClusterOption:
    Type: String
    AllowedValues:
      - NewAcs
    AssociationPropertyMetadata:
      Visible: false
      ValueLabelMapping:
        NewAcs:
          zh-cn: 新建ACS集群
          en: New ACS
    Label:
      en: Select cluster type
      zh-cn: 选择集群类型
    Required: true
    Default: NewAcs
  VpcId:
    Type: String
    Label:
      en: VPC ID
      zh-cn: 专有网络VPC实例ID
    Description:
      en: >-
        Please search the ID starting with (vpc-xxx) from console-Virtual
        Private Cloud
      zh-cn: 现有虚拟专有网络的实例ID
    Required: true
    Default: null
    AssociationProperty: 'ALIYUN::ECS::VPC::VPCId'
    AssociationPropertyMetadata:
      RegionId: '${RegionId}'
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  VSwitchId1:
    Type: String
    Label:
      en: VSwitch ID 1
      zh-cn: 交换机实例ID 1
    Description:
      en: >-
        Instance ID of existing business network switches, console-Virtual
        Private Cloud-VSwitches under query
      zh-cn: 现有业务网络交换机的实例ID
    Required: true
    Default: null
    AssociationProperty: 'ALIYUN::ECS::VSwitch::VSwitchId'
    AssociationPropertyMetadata:
      VpcId: '${VpcId}'
      ZoneId: '${ZoneId1}'
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  VSwitchId2:
    Type: String
    Label:
      en: VSwitch ID 2
      zh-cn: 交换机实例ID2
    Description:
      en: >-
        Instance ID of existing business network switches, console-Virtual
        Private Cloud-VSwitches under query
      zh-cn: 现有业务网络交换机的实例ID
    Required: true
    Default: null
    AssociationProperty: 'ALIYUN::ECS::VSwitch::VSwitchId'
    AssociationPropertyMetadata:
      VpcId: '${VpcId}'
      ZoneId: '${ZoneId2}'
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  EnableCustomAlbVSwitch:
    Type: Boolean
    Label:
      en: Use dedicated VSwitch for ALB
      zh-cn: 为 ALB 指定独立交换机
    Description:
      zh-cn: 开启后可为 ALB 单独指定交换机，与集群节点交换机隔离。仅在已有VPC场景下生效。
      en: When enabled, you can specify dedicated VSwitches for ALB, isolated from cluster node VSwitches. Only effective in ExistingVPC scenario.
    Default: false
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  AlbVSwitchId1:
    Type: String
    Label:
      en: ALB VSwitch ID (Zone 1)
      zh-cn: ALB 交换机ID（可用区1）
    Description:
      en: Dedicated VSwitch for ALB in Zone 1. Must belong to the same VPC but can be different from cluster VSwitches.
      zh-cn: ALB 在可用区1使用的专用交换机，须属于同一VPC，可与集群节点交换机不同。
    Required: false
    Default: null
    AssociationProperty: 'ALIYUN::ECS::VSwitch::VSwitchId'
    AssociationPropertyMetadata:
      VpcId: '${VpcId}'
      ZoneId: '${ZoneId1}'
      Visible:
        Condition:
          Fn::And:
            - Fn::Equals:
                - ExistingVPC
                - ${VpcOption}
            - Fn::Equals:
                - true
                - ${EnableCustomAlbVSwitch}
  AlbVSwitchId2:
    Type: String
    Label:
      en: ALB VSwitch ID (Zone 2)
      zh-cn: ALB 交换机ID（可用区2）
    Description:
      en: Dedicated VSwitch for ALB in Zone 2. Must belong to the same VPC but can be different from cluster VSwitches.
      zh-cn: ALB 在可用区2使用的专用交换机，须属于同一VPC，可与集群节点交换机不同。
    Required: false
    Default: null
    AssociationProperty: 'ALIYUN::ECS::VSwitch::VSwitchId'
    AssociationPropertyMetadata:
      VpcId: '${VpcId}'
      ZoneId: '${ZoneId2}'
      Visible:
        Condition:
          Fn::And:
            - Fn::Equals:
                - ExistingVPC
                - ${VpcOption}
            - Fn::Equals:
                - true
                - ${EnableCustomAlbVSwitch}
  VpcCidrBlock:
    Type: String
    Label:
      en: VPC CIDR IPv4 Block
      zh-cn: 专有网络IPv4网段
    Description:
      zh-cn: VPC的ip地址段范围，<br>您可以使用以下的ip地址段或其子网:<br><font color='green'>[10.0.0.0/8]</font><br><font color='green'>[172.16.0.0/12]</font><br><font color='green'>[192.168.0.0/16]</font>
      en: 'The ip address range of the VPC in the CidrBlock form; <br>You can use the following ip address ranges and their subnets: <br><font color=''green''>[10.0.0.0/8]</font><br><font color=''green''>[172.16.0.0/12]</font><br><font color=''green''>[192.168.0.0/16]</font>'
    Default: 192.168.0.0/16
    Required: true
    AssociationProperty: ALIYUN::VPC::VPC::CidrBlock
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  VSwitchCidrBlock1:
    Type: String
    Label:
      en: VSwitch CIDR Block 1
      zh-cn: 交换机子网网段1
    Description:
      zh-cn: 必须属于VPC的子网段。
      en: Must belong to the subnet segment of VPC.
    Default: 192.168.0.0/24
    Required: true
    AssociationProperty: ALIYUN::VPC::VSwitch::CidrBlock
    AssociationPropertyMetadata:
      VpcCidrBlock: VpcCidrBlock
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  VSwitchCidrBlock2:
    Type: String
    Label:
      en: VSwitch CIDR Block 2
      zh-cn: 交换机子网网段 2
    Description:
      zh-cn: 必须属于VPC的子网段。
      en: Must belong to the subnet segment of VPC.
    Default: 192.168.1.0/24
    Required: true
    AssociationProperty: ALIYUN::VPC::VSwitch::CidrBlock
    AssociationPropertyMetadata:
      VpcCidrBlock: VpcCidrBlock
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  ServiceCidr:
    Type: String
    Description:
      zh-cn: 可选范围：10.0.0.0/16-24，172.16-31.0.0/16-24，192.168.0.0/16-24<br>不能与 VPC 及 VPC 内已有 Kubernetes 集群使用的网段重复。<font color='blue'><b>创建成功后不能修改</b></font>
      en: 'Optional range: 10.0.0.0/16-24, 172.16-31.0.0/16-24, 192.168.0.0/16-24<br> cannot duplicate segments already used by existing Kubernetes clusters in VPC and VPC.<font color=''blue''><b>Cannot be modified after successful creation</b></font>'
    Label:
      zh-cn: Service CIDR
      en: Service CIDR
    AssociationProperty: ALIYUN::CS::ManagedKubernetesCluster::ServiceCidr
    AssociationPropertyMetadata:
      ContainerCidr: 172.20.0.0/20
      VpcId: ${VpcId}
      RegionId: ${RegionId}
      ClusterType: ManagedKubernetes
      NodeCidrMask: 26
      Addons:
        - name: terway
    Default: 172.16.0.0/16
  InstanceType:
    Type: CommaDelimitedList
    Default:
      - ecs.u1-c1m2.xlarge
    AssociationProperty: ALIYUN::ECS::Instance::InstanceType
    AssociationPropertyMetadata:
      CreateACKClusterParams:
        NetworkPlugin: terway-eniip
      Visible:
        Condition:
          Fn::Equals:
            - NewAck
            - ${ClusterOption}
    Label:
      en: Worker Instance Type
      zh-cn: Worker 节点实例规格
  WorkerSystemDiskSize:
    Default: 120
    Label: Worker节点系统盘大小(GB)
    Type: Number
    MinValue: 1
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewAck
            - ${ClusterOption}
  WorkerSystemDiskCategory:
    Type: String
    AssociationPropertyMetadata:
      LocaleKey: DiskCategory
      InstanceType: ${InstanceType}
      Visible:
        Condition:
          Fn::Equals:
            - NewAck
            - ${ClusterOption}
    Default: cloud_essd
    AllowedValues:
      - cloud_efficiency
      - cloud_ssd
      - cloud_essd
  InstancePassword:
    Default: Null
    NoEcho: true
    Type: String
    Description:
      en: Server login password, Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in)
      zh-cn: 服务器登录密码,长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）
    Label:
      en: Instance Password
      zh-cn: 实例密码
    AllowedPattern: '[0-9A-Za-z\_\-\&:;''<>,=%`~!@#\(\)\$\^\*\+\|\{\}\[\]\.\?\/]+$'
    ConstraintDescription:
      en: Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in)
      zh-cn: 长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）
    AssociationProperty: ALIYUN::ECS::Instance::Password
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewAck
            - ${ClusterOption}
  WorkerInstanceCount:
    Default: 3
    Type: Number
    Label:
      zh-cn: 实例节点数
      en: The count for cpu instance.
    MinValue: 3
    MaxValue: 5000
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::And:
            - Fn::Equals:
              - ${AutoScalingOption}
              - false
            - Fn::Equals:
              - NewAck
              - ${ClusterOption}
  WorkerInstanceMinCount:
    Default: 3
    Type: Number
    Label:
      zh-cn: 最小实例节点数
      en: The min count for cpu instance.
    MinValue: 3
    MaxValue: 5000
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::And:
            - Fn::Equals:
              - ${AutoScalingOption}
              - true
            - Fn::Equals:
              - NewAck
              - ${ClusterOption}
