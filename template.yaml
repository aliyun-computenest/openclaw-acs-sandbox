      en: The max count for cpu instance.
    Description:
      en: If you want to enable automatic elastic scaling, the number of nodes must be greater than the minimum.
      zh-cn: 若需要启用自动弹性伸缩，需要大于最小节点数。
    MinValue: 3
    MaxValue: 5000
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::And:
            - Fn::Equals:
              - ${AutoScalingOption}
              - true
            - Fn::Equals:
              - NewAck
              - ${ClusterOption}
  AutoScalingOption:
    Type: Boolean
    Label:
      en: Whether to enable automatic elastic scaling of a node pool.
      zh-cn: 节点池是否启用自动弹性伸缩
    Description:
      zh-cn: 节点池若开启自动弹性伸缩，付费方式只能选择按量付费
      en: If automatic elastic expansion is enabled for a node pool, the payment mode can only be Postpaid
    Default: false
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewAck
            - ${ClusterOption}
  AckNetworkPlugin:
    Type: String
    Label:
      en: ACK plugin network
      zh-cn: ACK 网络插件
    AllowedValues:
      - terway
      - flannel
    Default: terway
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewAck
            - ${ClusterOption}
  E2BDomainAddress:
    Type: String
    Label:
      en: Sandbox Domain
      zh-cn: Sandbox 访问域名
    Description:
      en: Please enter a valid domain name
      zh-cn: 请输入有效的域名
    AllowedPattern: ^(?!-)[A-Za-z0-9-]{1,63}(?<!-)(\.[A-Za-z0-9-]{1,63}(?<!-))+$
    Default: agent-vpc.infra
  EnablePrivateZone:
    Type: Boolean
    Label:
      zh-cn: 是否配置内网域名解析
      en: Enable internal network domain name resolution
    Description:
      zh-cn: 若需要内网访问，需要通过PrivateZone配置内网域名解析。打开此配置会自动创建PrivateZone，并设置内网权威域名的生效范围为所选的VPC。
      en: If internal network access is required, configure internal domain name resolution through PrivateZone. This will create a PrivateZone and set the effective range to the selected VPC.
    Default: true
  TLSCert:
    Type: String
    Label:
      en: TLS Cert.
      zh-cn: TLS 证书
    Description:
      zh-cn: 证书对应的fullchain.pem文件
      en: The fullchain.pem file of the certificate
    NoEcho: true
    AssociationProperty: FileContent
    AssociationPropertyMetadata:
      AcceptFileSuffixes: .pem
  TLSSecret:
    Type: String
    Label:
      en: TLS Secret.
      zh-cn: TLS 证书密钥
    Description:
      zh-cn: 证书对应的privkey.pem文件
      en: The privkey.pem file of the certificate
    NoEcho: true
    AssociationProperty: FileContent
    AssociationPropertyMetadata:
      AcceptFileSuffixes: .pem
  AdminApiKey:
    Type: String
    Label:
      zh-cn: Sandbox API 访问密钥
      en: API Key for Sandbox Access
    AssociationProperty: AutoCompleteInput
    AssociationPropertyMetadata:
      Length: 32
      Prefix: e2b_
      CharacterClasses:
        - Class: lowercase
          min: 10
        - Class: number
          min: 10
    Default: null
  SandboxManagerCpu:
    Type: Number
    Label:
      en: CPU resources for sandbox-manager
      zh-cn: Sandbox Manager CPU 资源
    Description:
      zh-cn: 为 sandbox-manager 分配的 CPU 核数
      en: CPU cores allocated for sandbox-manager
    Default: 2
    MinValue: 2
    MaxValue: 32
  SandboxManagerMemory:
    Type: String
    Label:
      en: Memory resources for sandbox-manager
      zh-cn: Sandbox Manager 内存资源
    Description:
      zh-cn: 为 sandbox-manager 分配的内存大小
      en: Memory allocated for sandbox-manager
    Default: 4Gi
  OpenClawReplicas:
    Type: Number
    Label:
      en: OpenClaw Replicas
      zh-cn: OpenClaw 预热副本数
    Description:
      zh-cn: SandboxSet预热池中的沙箱副本数量
      en: Number of sandbox replicas in the SandboxSet warm pool
    Default: 1
    MinValue: 1
    MaxValue: 10
  OpenClawImage:
    Type: String
    Label:
      en: OpenClaw Image
      zh-cn: OpenClaw 镜像地址
    Description:
      zh-cn: OpenClaw 容器镜像地址，根据部署地域自动选择最优镜像源
      en: OpenClaw container image address, automatically selects optimal registry based on region
    AssociationProperty: TextArea
    AssociationPropertyMetadata:
      DynamicValue:
        # 支持的地域：北京、上海、广州、杭州、新加坡、香港、东京 - 使用对应地域的 ACK 内网镜像仓库
        - Condition:
            Fn::Contains:
              - - cn-beijing
                - cn-shanghai
                - cn-guangzhou
                - cn-hangzhou
                - ap-southeast-1
                - cn-hongkong
                - ap-northeast-1
                - us-east-1
              - ${RegionId}
          Value: registry-${RegionId}.ack.aliyuncs.com/ack-demo/openclaw:2026.3.23-2
        # 其他地域 - 使用杭州公网镜像仓库
        - Condition:
            Fn::Not:
              Fn::Contains:
                - - cn-beijing
                  - cn-shanghai
                  - cn-guangzhou
                  - cn-hangzhou
                  - ap-southeast-1
                  - cn-hongkong
                  - ap-northeast-1
                  - us-east-1
                - ${RegionId}
          Value: registry-cn-hangzhou.ack.aliyuncs.com/ack-demo/openclaw:2026.3.23-2
  EnablePublicIp:
    Type: Boolean
    Description:
      en: Access sandbox-manager via the public network. (Alb enable the public ip)
      zh-cn: 通过公网访问sandbox-manager.(Alb 开启公网访问)
    Label:
      en: Whether to enable the public ip.
      zh-cn: 是否支持公网访问
    Default: false
  # ==================== CMS 可观测性配置 ====================
  EnableCmsObservability:
    Type: Boolean
    Label:
      en: Enable CMS Observability
      zh-cn: 启用云监控可观测性
    Description:
      zh-cn: 启用后将通过无侵入方式接入阿里云云监控2.0（ARMS），自动采集 OpenClaw 的 Trace、Metrics 等可观测数据。需要提前在云监控2.0控制台创建工作空间。
      en: When enabled, OpenClaw will be instrumented with Alibaba Cloud CMS 2.0 (ARMS) for automatic trace and metrics collection. Requires a pre-created CMS 2.0 workspace.
    Default: false

  CmsWorkspaceName:
    Type: String
    Label:
      en: CMS Workspace Name
      zh-cn: 云监控工作空间名称
    Description:
      zh-cn: 云监控2.0工作空间名称。如启用云监控可观测性，必须填写。可在云监控2.0控制台创建工作空间
      en: CMS 2.0 workspace name. If empty, defaults to default-cms-${AccountUID}-${RegionId}.
    Default: ''
    AssociationProperty: ALIYUN::CMS::Workspace
    Required: true
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - true
            - ${EnableCmsObservability}
  CmsServiceName:
    Type: String
    Required: false
    Label:
      en: CMS Service Name
      zh-cn: 云监控应用服务名称
    Description:
      zh-cn: 云监控2.0中的应用服务名称，用于标识 OpenClaw 的 Trace 数据来源。
      en: Application service name in CMS 2.0, used to identify the source of OpenClaw trace data.
    Default: openclaw
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - true
            - ${EnableCmsObservability}

Resources:
  # ========== CMS 可观测性：通过 DATASOURCE 自动查询 ServiceObservability 信息 ==========
  CmsServiceObservability:
    Type: DATASOURCE::CMS2::ServiceObservability
    Condition: EnableCmsObservabilityCondition
    Properties:
      RefreshOptions: Always
      Type: apm
      Workspace:
        Ref: CmsWorkspaceName
  VpcModule:
    Type: MODULE::ACS::ComputeNest::VpcAndVSwitch
    Version: default
    Properties:
      EnableDualZones: true
      VSwitchCidrBlockSecondary:
        Ref: VSwitchCidrBlock2
      VpcId:
        Ref: VpcId
      ZoneIdSecondary:
        Ref: ZoneId2
      VSwitchCidrBlock:
        Ref: VSwitchCidrBlock1
      VpcCidrBlock:
        Ref: VpcCidrBlock
      ZoneId:
        Ref: ZoneId1
      VSwitchIdSecondary:
        Ref: VSwitchId2
      VSwitchId:
        Ref: VSwitchId1
      VpcOption:
        Ref: VpcOption
  Sleep:
    Type: ALIYUN::ROS::Sleep
    DependsOn:
      - AckOrAcsCluster
    Properties:
      CreateDuration: 10
  AckOrAcsCluster:
    Version: v14
    Type: MODULE::SHARE::1853370294850618::AckOrAcsCluster
    Properties:
      KubernetesVersion: 1.32.7-aliyun.1
      EnableDualZones: true
      PayType: PostPaid
      CsOptions:
        Ref: ClusterOption
      VpcId:
        Fn::GetAtt:
          - VpcModule
          - VpcId
      ServiceCidr:
        Ref: ServiceCidr
      WorkerInstanceTypes:
        Ref: InstanceType
      ZoneIdSecondary:
        Ref: ZoneId2
      ZoneId:
        Ref: ZoneId1
      WorkerSystemDiskSize:
        Ref: WorkerSystemDiskSize
      AckNetworkPlugin:
        Ref: AckNetworkPlugin
      VSwitchIdSecondary:
        Fn::GetAtt:
          - VpcModule
          - VSwitchIdSecondary
      VSwitchId:
        Fn::GetAtt:
          - VpcModule
          - VSwitchId
      PodVSwitchId:
        Fn::GetAtt:
          - VpcModule
          - VSwitchId
      PodVSwitchIdSecondary:
        Fn::GetAtt:
          - VpcModule
          - VSwitchIdSecondary
      WorkerSystemDiskCategory:
        Ref: WorkerSystemDiskCategory
      LoginPassword:
        Ref: InstancePassword
      WorkerInstanceCount:
        Ref: WorkerInstanceCount
      WorkerInstanceMinCount:
        Ref: WorkerInstanceMinCount
      WorkerInstanceMaxCount:
        Ref: WorkerInstanceMaxCount
      ClusterSpec: ack.pro.small
      SnatEntry:
        Ref: SnatEntry
      EndpointPublicAccess: true
  # ========== Addon 组件安装（带依赖链） ==========
  # Step 1: ALB Ingress Controller（基础网络）
  AlbIngressAddon:
    Type: ALIYUN::CS::ClusterAddons
    DependsOn: Sleep
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
      InstalledIgnore: true
      Addons:
        - Name: alb-ingress-controller
          Config:
            Fn::Sub:
              - '{"albIngress":{"AddressType":"${AddressType}","ZoneMappings":{"${ZoneId1}":["${VswitchId1}"],"${ZoneId2}":["${VswitchId2}"]},"CreateDefaultALBConfig":true}}'
              - ZoneId1:
                  Ref: ZoneId1
                VswitchId1:
                  Fn::If:
                    - UseCustomAlbVSwitchCondition
                    - Ref: AlbVSwitchId1
                    - Fn::GetAtt:
                        - VpcModule
                        - VSwitchId
                ZoneId2:
                  Ref: ZoneId2
                VswitchId2:
                  Fn::If:
                    - UseCustomAlbVSwitchCondition
                    - Ref: AlbVSwitchId2
                    - Fn::GetAtt:
                        - VpcModule
                        - VSwitchIdSecondary
                AddressType:
                  Fn::If:
                    - EnablePublicIpConditions
                    - Internet
                    - Intranet
  # Step 2: 等待 ALB Ingress 就绪
  AlbIngressSleep:
    Type: ALIYUN::ROS::Sleep
    DependsOn: AlbIngressAddon
    Properties:
      CreateDuration: 180
  # ========== 查询 ALB 实例（通过集群标签） ==========
  AlbDataSource:
    Type: DATASOURCE::ALB::LoadBalancers
    DependsOn: AddonSleep
    Properties:
      AddressType:
        Fn::If:
          - EnablePublicIpConditions
          - Internet
          - Intranet
      VpcIds:
        - Fn::GetAtt:
            - VpcModule
            - VpcId
      Tags:
        - Key: ack.aliyun.com
          Value:
            Fn::GetAtt:
              - AckOrAcsCluster
              - ClusterId
  # Step 3: ARMS Prometheus（Sandbox Manager 依赖）
  ArmsPrometheusAddon:
    Type: ALIYUN::CS::ClusterAddons
    DependsOn: AlbIngressSleep
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
      InstalledIgnore: true
      Addons:
        - Name: arms-prometheus
          Version: ''
          Config: '{"controller":{"nodeExporter":{"hostProcFsMount":{"enabled":true},"hostSysFsMount":{"enabled":true},"hostRootFsMount":{"enabled":true}}}}'
  # 等待 ARMS Prometheus 就绪
  ArmsPrometheusSleep:
    Type: ALIYUN::ROS::Sleep
    DependsOn: ArmsPrometheusAddon
    Properties:
      CreateDuration: 60
  # Step 4: Sandbox Controller
  SandboxControllerAddon:
    Type: ALIYUN::CS::ClusterAddons
    DependsOn: ArmsPrometheusSleep
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
      Addons:
        - Name: ack-agent-sandbox-controller
          Version: 'v0.5.9'
          Config: '{"workers":{"sandboxWorkers":200,"sandboxsetWorkers":10,"sandboxclaimWorkers":200},"featureGate":""}'
  # Step 4: Sandbox Manager
  SandboxManagerAddon:
    Type: ALIYUN::CS::ClusterAddons
    DependsOn: SandboxControllerAddon
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
      InstalledIgnore: true
      Addons:
        - Name: ack-sandbox-manager
          Version: 'v0.5.0'
          Config:
            Fn::Sub:
              - '{"sandboxManager":{"replicaCount":3,"acs":false,"e2b":{"domain":"${E2BDomainAddress}","enableAuth":true,"adminApiKey":"${AdminApiKey}","maxTimeout":2592000},"ingress":{"className":"alb"},"controller":{"resources":{"cpu":"${SandboxManagerCpu}","memory":"${SandboxManagerMemory}"},"logLevel":5,"enableSLS":true,"maxClaimWorkers":100,"maxCreateQPS":200,"createPodInsteadOfSandbox":false,"extProcMaxConcurrency":3000}}}'
              - E2BDomainAddress:
                  Ref: E2BDomainAddress
                AdminApiKey:
                  Ref: AdminApiKey
                SandboxManagerCpu:
                  Ref: SandboxManagerCpu
                SandboxManagerMemory:
                  Ref: SandboxManagerMemory
  # 等待 Sandbox Addon 就绪
  SandboxAddonSleep:
    Type: ALIYUN::ROS::Sleep
    DependsOn: SandboxManagerAddon
    Properties:
      CreateDuration: 60
  # 等待所有必要 Addon 就绪
  AddonSleep:
    Type: ALIYUN::ROS::Sleep
    DependsOn: SandboxAddonSleep
    Properties:
      CreateDuration: 60
  # 获取集群 Kubeconfig（用于 ALB Config Job）
  ClusterUserKubeconfig:
    Type: DATASOURCE::CS::ClusterUserKubeconfig
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
  # TLS Secret 配置
  ClusterAppliaction:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn: AddonSleep
    Properties:
      DefaultNamespace: sandbox-system
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: v1
            kind: Secret
            type: kubernetes.io/tls
            metadata:
              name: sandbox-manager-tls
              namespace: sandbox-system
            data:
              tls.crt: ${TLSCertString}
              tls.key: ${TLSSecretString}
          - TLSCertString:
              Fn::Base64Encode:
                Ref: TLSCert
            TLSSecretString:
              Fn::Base64Encode:
                Ref: TLSSecret
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
  OpenClawSandboxSet:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn:
      - ClusterAppliaction
      - LoongCollectorSleep
    Properties:
      DefaultNamespace: default
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: agents.kruise.io/v1alpha1
            kind: SandboxSet
            metadata:
              name: openclaw
              namespace: default
              labels:
                app: openclaw
            spec:
              persistentContents:
                - filesystem
              replicas: ${OpenClawReplicas}
              template:
                metadata:
                  labels:
                    alibabacloud.com/acs: "true"
                    app: openclaw
                  annotations:
                    ops.alibabacloud.com/pause-enabled: "true"
                    k8s.aliyun.com/eci-network-policy-enable: "true"
                    network.alibabacloud.com/enable-network-policy-agent: "true"
                    network.alibabacloud.com/network-policy-mode: "traffic-policy"
                spec:
                  automountServiceAccountToken: false
                  enableServiceLinks: false
                  hostNetwork: false
                  hostPID: false
                  hostIPC: false
                  shareProcessNamespace: false
                  hostname: openclaw
                  dnsPolicy: None
                  dnsConfig:
                    nameservers:
                      - "100.100.2.136"
                      - "100.100.2.138"
                    searches:
                      - default.svc.cluster.local
                      - svc.cluster.local
                      - cluster.local
                    options:
                      - name: ndots
                        value: "5"
                  initContainers:
                    - name: tini-copy
                      image: kube-ai-registry.cn-shanghai.cr.aliyuncs.com/kube-ai/ubuntu-tini:krallin-ubuntu-tini-latest
                      command: ["sh", "-c"]
                      args:
                        - |
                          cp /usr/bin/tini /mnt/tini/tini
                          chmod +x /mnt/tini/tini
                      volumeMounts:
                        - name: tini-volume
                          mountPath: /mnt/tini
                    - name: init
                      image: "${InitImage}"
                      command: [ "sh", "/workspace/entrypoint_inner.sh" ]
                      volumeMounts:
                        - name: envd-volume
                          mountPath: /mnt/envd
                      env:
                        - name: ENVD_DIR
                          value: /mnt/envd
                        - name: __IGNORE_RESOURCE__
                          value: "true"
                      restartPolicy: Always
                  containers:
                    - name: gateway
                      image: "${OpenClawImage}"
                      securityContext:
                        readOnlyRootFilesystem: false
                        runAsUser: 0
                        runAsGroup: 0
                      command: ["/mnt/tini/tini", "--"]
                      args:
                        - bash
                        - -c
                        - "echo ${CmsGatewayStartScriptB64} | base64 -d | bash"
                      ports:
                        - name: gateway
                          containerPort: 18789
                          protocol: TCP
                        - name: runtime
                          containerPort: 49983
                          protocol: TCP
                      env:
                        - name: ENVD_DIR
                          value: /mnt/envd
                        - name: OPENCLAW_CONFIG_DIR
                          value: /root/.openclaw
                        - name: KUBERNETES_SERVICE_PORT_HTTPS
                          value: ""
                        - name: KUBERNETES_SERVICE_PORT
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP_PROTO
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP_ADDR
                          value: ""
                        - name: KUBERNETES_SERVICE_HOST
                          value: ""
                        - name: KUBERNETES_PORT
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP_PORT
                          value: ""
                      volumeMounts:
                        - name: envd-volume
                          mountPath: /mnt/envd
                        - name: tini-volume
                          mountPath: /mnt/tini
                      resources:
                        requests:
                          cpu: 2
                          memory: 4Gi
                        limits:
                          cpu: 2
                          memory: 4Gi
                      lifecycle:
                        postStart:
                          exec:
                            command:
                              - bash
                              - /mnt/envd/envd-run.sh
                      startupProbe:
                        exec:
                          command:
                            - node
                            - -e
                            - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
                        initialDelaySeconds: 5
                        periodSeconds: 5
                        failureThreshold: 60
                      # livenessProbe:
                      #   exec:
                      #     command:
                      #       - node
                      #       - -e
                      #       - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
                      #   initialDelaySeconds: 60
                      #   periodSeconds: 30
                      #   timeoutSeconds: 10
                      # readinessProbe:
                      #   exec:
                      #     command:
                      #       - node
                      #       - -e
                      #       - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
                      #   initialDelaySeconds: 15
                      #   periodSeconds: 10
                      #   timeoutSeconds: 5
                  terminationGracePeriodSeconds: 1
                  volumes:
                    - name: envd-volume
                      emptyDir: { }
                    - name: tini-volume
                      emptyDir: { }
          - OpenClawReplicas:
              Ref: OpenClawReplicas
            OpenClawImage:
              Ref: OpenClawImage
            CmsGatewayStartScriptB64:
              Fn::Base64Encode:
                Fn::If:
                  - EnableCmsObservabilityCondition
                  - Fn::Sub:
                      - |-
                        set -eu
                        # CMS 安装脚本（安装 openclaw-cms-plugin，自动写入 openclaw.json 配置）
                        wget -qO- https://arms-apm-cn-hangzhou-pre.oss-cn-hangzhou.aliyuncs.com/openclaw-cms-plugin/install-wget-nest.sh | bash -s -- --endpoint "${Endpoint}" --x-arms-license-key "${LicenseKey}" --x-arms-project "${ArmsProject}" --x-cms-workspace "${WorkspaceName}" --serviceName "${ServiceName}" || true
                        echo "=== Starting Gateway ==="
                        exec node openclaw.mjs gateway run --allow-unconfigured
                      - LicenseKey:
                          Fn::Jq:
                            - First
                            - .AuthToken
                            - Fn::GetAtt:
                                - CmsServiceObservability
                                - EntryPointInfo
                        ArmsProject:
                          Fn::Jq:
                            - First
                            - .Project
                            - Fn::GetAtt:
                                - CmsServiceObservability
                                - EntryPointInfo
                        WorkspaceName:
                          Ref: CmsWorkspaceName
                        ServiceName:
                          Ref: CmsServiceName
                        Endpoint:
                          Fn::Sub:
                            - 'https://${ArmsProject}.${RegionId}.log.aliyuncs.com/apm/trace/opentelemetry'
                            - RegionId:
                                Ref: ALIYUN::Region
                              ArmsProject:
                                Fn::Jq:
                                  - First
                                  - .Project
                                  - Fn::GetAtt:
                                      - CmsServiceObservability
                                      - EntryPointInfo
                  - 'exec node openclaw.mjs gateway run --allow-unconfigured'
            InitImage:
              Fn::Sub:
                - registry-${RegionId}.ack.aliyuncs.com/acs/agent-runtime:v0.0.5
                - RegionId:
                    Ref: ALIYUN::Region

      WaitUntil:
        # 等待 SandboxSet 至少有一个可用副本
        # 超时 300 秒（5分钟）- 如果超时请检查：
        # 1. 是否已开通镜像缓存白名单（403 错误）
        # 2. 镜像是否存在/可拉取
        # 3. Pod 资源配额是否充足
        - Kind: SandboxSet
          ApiVersion: agents.kruise.io/v1alpha1
          Name: openclaw
          Namespace: default
          JsonPath: $.status.availableReplicas
          Operator: NotEmpty
          Timeout: 600
          FirstMatch: true
  # ========== ALB Config Job（配置 HTTPS 443 监听器） ==========
  EditAlbConfigServiceAccount:
    Type: ALIYUN::CS::ClusterApplication
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: 'edit-alb-config-sa'
          namespace: "sandbox-system"
  EditAlbConfigRole:
    Type: ALIYUN::CS::ClusterApplication
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: 'edit-alb-config-role'
          namespace: "sandbox-system"
        rules:
        - apiGroups: ["alibabacloud.com"]
          resources: ["albconfigs"]
          verbs: ["get", "list", "update","patch"]
  EditAlbConfigBinding:
    Type: ALIYUN::CS::ClusterApplication
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: "edit-alb-config-rolebinding"
          namespace: "sandbox-system"
        subjects:
        - kind: ServiceAccount
          name: 'edit-alb-config-sa'
          namespace: "sandbox-system"
        roleRef:
          kind: ClusterRole
          name: 'edit-alb-config-role'
          apiGroup: rbac.authorization.k8s.io
  EditAlbConfigJob:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn:
      - AddonSleep
      - EditAlbConfigBinding
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: batch/v1
            kind: Job
            metadata:
              name: edit-alb-config-job
            spec:
              template:
                metadata:
                  name: edit-alb-config-job
                spec:
                  serviceAccountName: edit-alb-config-sa
                  restartPolicy: Never
                  containers:
                  - name: edit-alb-config-job
                    image: compute-nest-registry.cn-hangzhou.cr.aliyuncs.com/public/dtzar/helm-kubectl:3.12.0
                    command: [ "/bin/sh", "-c", "--" ]
                    args:
                      - |
                        set -x
                        cd ~
                        mkdir -p ~/.kube
                        echo '${KubeConfig}' | base64 -d >> ~/.kube/config

                        echo "开始修改 AlbConfig 资源：alb"
                        kubectl patch albconfig.alibabacloud.com alb --type='json' -p='[{"op":"add","path":"/spec/listeners/-","value":{"port":443,"protocol":"HTTPS","requestTimeout":600}}]'

          - KubeConfig:
              Fn::Replace:
                - "\n": ''
                - Fn::Base64Encode:
                    Fn::GetAtt:
                      - ClusterUserKubeconfig
                      - Config
  # ========== 测试 Pod（所有资源就绪后运行） ==========
  TestPod:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn:
      - OpenClawSandboxSet
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: v1
            kind: Pod
            metadata:
              name: acs-sandbox-test-pod
              namespace: default
              labels:
                app: acs-sandbox-test-pod
            spec:
              containers:
                - name: acs-sandbox-test-pod
                  image: {{ computenest::acrimage::acs-sandbox-test-pod }}
                  imagePullPolicy: Always
                  env:
                    - name: E2B_API_KEY
                      value: ${AdminApiKey}
                    - name: E2B_DOMAIN
                      value: ${E2BDomainAddress}
                    - name: SSL_CERT_FILE
                      value: "${TLSCert}"
              restartPolicy: Never
          - AdminApiKey:
              Ref: AdminApiKey
            E2BDomainAddress:
              Ref: E2BDomainAddress
            TLSCert:
              Ref: TLSCert

  # ========== PrivateZone — NewVPC 场景：创建全新 Zone ==========
  PrivateZone:
    Condition: EnablePrivateZoneForNewVpcCondition
    Type: ALIYUN::PVTZ::Zone
    DependsOn: OpenClawSandboxSet
    Properties:
      ProxyPattern: ZONE
      ZoneName:
        Ref: E2BDomainAddress
  PrivateZoneVpcBinder:
    Condition: EnablePrivateZoneForNewVpcCondition
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    Properties:
      Vpcs:
        - RegionId:
            Ref: ALIYUN::Region
          VpcId:
            Fn::GetAtt:
              - VpcModule
              - VpcId
      ZoneId:
        Fn::GetAtt:
          - PrivateZone
          - ZoneId
  PrivateZoneCnameRecord:
    Condition: EnablePrivateZoneForNewVpcCondition
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn:
      - PrivateZoneVpcBinder
      - AlbDataSource
    Properties:
      ZoneId:
        Fn::GetAtt:
          - PrivateZone
          - ZoneId
      Rr: "*"
      Type: CNAME
      Value:
        Fn::Jq:
          - First
          - '.[0].DNSName'
          - Fn::GetAtt:
              - AlbDataSource
              - LoadBalancers

  # ========== PrivateZone — ExistingVPC + 无同名 Zone：创建新 Zone + 绑定 VPC + CNAME ==========
  PrivateZoneForExistingVpc:
    Condition: ExistingVpcNeedNewZoneCondition
    Type: ALIYUN::PVTZ::Zone
    Properties:
      ProxyPattern: ZONE
      ZoneName:
        Ref: E2BDomainAddress
  PrivateZoneVpcBinderForExistingVpc:
    Condition: ExistingVpcNeedNewZoneCondition
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    Properties:
      Vpcs:
        - RegionId:
            Ref: ALIYUN::Region
          VpcId:
            Ref: VpcId
      ZoneId:
        Fn::GetAtt:
          - PrivateZoneForExistingVpc
          - ZoneId
  ExistingVpcNewZoneCnameRecord:
    Condition: ExistingVpcNeedNewZoneCondition
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn:
      - PrivateZoneVpcBinderForExistingVpc
      - AlbDataSource
    Properties:
      ZoneId:
        Fn::GetAtt:
          - PrivateZoneForExistingVpc
          - ZoneId
      Rr: "*"
      Type: CNAME
      Value:
        Fn::Jq:
          - First
          - '.[0].DNSName'
          - Fn::GetAtt:
              - AlbDataSource
              - LoadBalancers

  # ========== PrivateZone — ExistingVPC + 已有同名 Zone：复用已有 ZoneId ==========
  # ZoneId 来自 Locals 中的 ExistingPrivateZoneId
  # 因为 ExistingVpcZonesLocal 已通过 VpcId 过滤，查到的 Zone 一定已绑定该 VPC
  # 所以无需再执行 ZoneVpcBinder，直接添加 CNAME 记录即可
  ExistingVpcReuseZoneCnameRecord:
    Condition: ExistingVpcReuseZoneCondition
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn:
      - AlbDataSource
    Properties:
      ZoneId:
        Ref: ExistingPrivateZoneId
      Rr: "*"
      Type: CNAME
      Value:
        Fn::Jq:
          - First
          - '.[0].DNSName'
          - Fn::GetAtt:
              - AlbDataSource
              - LoadBalancers
  # ========== LoongCollector 日志采集器（在 SandboxSet 之前部署，确保组件注入顺序正确）==========
  LoongCollectorAddon:
    Type: ALIYUN::CS::ClusterAddons
    DependsOn: AddonSleep
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
      InstalledIgnore: true
      Addons:
        - Name: alibaba-log-controller
          Version: ''
          Config: '{}'
  # 等待 LoongCollector Addon 安装完成
  LoongCollectorSleep:
    Type: ALIYUN::ROS::Sleep
    DependsOn: LoongCollectorAddon
    Properties:
      CreateDuration: 60
  LoongCollectorSeesionCR:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn: LoongCollectorSleep
    Properties:
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: telemetry.alibabacloud.com/v1alpha1
            kind: ClusterAliyunPipelineConfig
            metadata:
              name: openclaw-session-config
            spec:
              config:
                aggregators: []
                global:
                  TopicType: filepath
                  TopicFormat: .*/sessions/(?P<__session_id__>.*?).jsonl
                inputs:
                  - Type: input_file
                    FilePaths:
                      - /root/.openclaw/agents/*/sessions/*.jsonl
                    MaxDirSearchDepth: 0
                    FileEncoding: utf8
                    EnableContainerDiscovery: true
                    ContainerFilters:
                      K8sPodRegex: ^(openclaw.*)$
                processors:
                  - Type: processor_parse_json_native
                    SourceKey: content
                flushers:
                  - Type: flusher_sls
                    Logstore: openclaw-session
                sample: ''
              logstores:
                - encryptConf: {}
                  name: openclaw-session
                  productCode: openclaw_audit
              machineGroups:
                - name: k8s-group-${ClusterId}
              project:
                name: k8s-log-${ClusterId}
          - ClusterId:
              Fn::GetAtt:
                - AckOrAcsCluster
                - ClusterId
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
  LoongCollectorRuntimeCR:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn: LoongCollectorSleep
    Properties:
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: telemetry.alibabacloud.com/v1alpha1
            kind: ClusterAliyunPipelineConfig
            metadata:
              name: openclaw-runtime-config
            spec:
              config:
                flushers:
                  - Logstore: openclaw-runtime
                    Type: flusher_sls
                global: {}
                inputs:
                  - ContainerFilters:
                      K8sPodRegex: ^(openclaw.*)$
                    EnableContainerDiscovery: true
                    FileEncoding: utf8
                    FilePaths:
                      - /tmp/openclaw/*.log
                    MaxDirSearchDepth: 0
                    Type: input_file
                processors:
                  - SourceKey: content
                    Type: processor_parse_json_native
              logstores:
                - encryptConf: {}
                  name: openclaw-runtime
                  productCode: openclaw_gateway
              machineGroups:
                - name: k8s-group-${ClusterId}
              project:
                name: k8s-log-${ClusterId}
          - ClusterId:
              Fn::GetAtt:
                - AckOrAcsCluster
                - ClusterId
      ClusterId:
        Fn::GetAtt:
          - AckOrAcsCluster
          - ClusterId
Outputs:
  ALB_DNS_Name:
    Label:
      zh-cn: ALB 访问端点
      en: ALB DNS Name
    Value:
      Fn::Jq:
        - First
        - '.[0].DNSName'
        - Fn::GetAtt:
            - AlbDataSource
            - LoadBalancers
  ACS控制台地址:
    Value:
      Fn::Sub:
        - "https://acs.console.aliyun.com/v2?#/next/clusters/${ClusterId}/ingress?ns=sandbox-system"
        - ClusterId:
            Fn::GetAtt:
              - AckOrAcsCluster
              - ClusterId
  ClusterId:
    Label:
      zh-cn: 集群ID
      en: Cluster ID
    Description:
      zh-cn: ACS/ACK集群ID，用于获取kubeconfig
      en: ACS/ACK Cluster ID for kubeconfig retrieval
    Value:
      Fn::GetAtt:
        - AckOrAcsCluster
        - ClusterId
  E2B_API_KEY:
    Label: Sandbox API 访问密钥
    Value:
      Ref: AdminApiKey
    NoEcho: true
  E2B_DOMAIN:
    Label: Sandbox 访问域名
    Value:
      Ref: E2BDomainAddress

