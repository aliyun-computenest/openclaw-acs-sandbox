      ClusterSpec: ack.pro.small
      KubernetesVersion: 1.35.2-aliyun.1
      ChargeType: PostPaid
      SecurityGroupId:
        Fn::GetAtt:
          - OpenClawSecurityGroup
          - SecurityGroupId
      VpcId:
        Fn::If:
          - CreateNewVpcCondition
          - Fn::GetAtt:
              - Vpc
              - VpcId
          - Ref: VpcId
      VSwitchIds:
        - Fn::If:
            - CreateNewVpcCondition
            - Fn::GetAtt:
                - BusinessVSwitch1
                - VSwitchId
            - Ref: VSwitchId1
        - Fn::If:
            - CreateNewVpcCondition
            - Fn::GetAtt:
                - BusinessVSwitch2
                - VSwitchId
            - Ref: VSwitchId2
        - Fn::If:
            - CreateNewVpcCondition
            - Fn::GetAtt:
                - BusinessVSwitch3
                - VSwitchId
            - Ref: VSwitchId3
      PodVswitchIds:
        - Fn::If:
            - CreateNewVpcCondition
            - Fn::GetAtt:
                - OpenClawVSwitch1
                - VSwitchId
            - Ref: OpenClawVSwitchId1
        - Fn::If:
            - CreateNewVpcCondition
            - Fn::GetAtt:
                - OpenClawVSwitch2
                - VSwitchId
            - Ref: OpenClawVSwitchId2
        - Fn::If:
            - CreateNewVpcCondition
            - Fn::GetAtt:
                - OpenClawVSwitch3
                - VSwitchId
            - Ref: OpenClawVSwitchId3
      ServiceCidr:
        Ref: ServiceCidr
      Addons:
        - Name: terway-eniip
        - Name: csi-plugin
        - Name: csi-provisioner
        - Name: loongcollector
          Config: '{"IngressDashboardEnabled":"true"}'
      NumOfNodes: 0
      NodePools:
        - NodePoolInfo:
            Name: default-nodepool
          ScalingGroup:
            InstanceTypes:
              Ref: InstanceType
            InstanceChargeType: PostPaid
            SystemDiskCategory:
              Ref: WorkerSystemDiskCategory
            SystemDiskSize:
              Ref: WorkerSystemDiskSize
            LoginPassword:
              Ref: InstancePassword
            VSwitchIds:
              - Fn::If:
                  - CreateNewVpcCondition
                  - Fn::GetAtt:
                      - BusinessVSwitch1
                      - VSwitchId
                  - Ref: VSwitchId1
              - Fn::If:
                  - CreateNewVpcCondition
                  - Fn::GetAtt:
                      - BusinessVSwitch2
                      - VSwitchId
                  - Ref: VSwitchId2
              - Fn::If:
                  - CreateNewVpcCondition
                  - Fn::GetAtt:
                      - BusinessVSwitch3
                      - VSwitchId
                  - Ref: VSwitchId3
            ZoneIds:
              - Ref: ZoneId1
              - Ref: ZoneId2
              - Ref: ZoneId3
            DesiredSize:
              Ref: WorkerInstanceCount
          KubernetesConfig:
            Runtime: containerd
            RuntimeVersion: 1.6.28
      SnatEntry: true
      EndpointPublicAccess: true
      ProxyMode: ipvs
      DisableRollback: true
      TimeoutMins: 60
  AlbIngressAddon:
    Type: ALIYUN::CS::ClusterAddons
