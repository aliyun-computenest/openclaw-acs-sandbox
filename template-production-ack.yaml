ROSTemplateFormatVersion: '2015-09-01'
Description:
  en: Production deployment of OpenClaw to ACK cluster with VirtualNode (ACS), 3-AZ, 6 VSwitches (3 business + 3 OpenClaw isolated), PodNetworking VSwitch isolation, Poseidon TrafficPolicy
  zh-cn: 生产环境部署OpenClaw到ACK+VirtualNode(ACS)集群，3可用区、6交换机（3业务+3 OpenClaw隔离网段）、PodNetworking网络隔离、Poseidon TrafficPolicy网络策略
Conditions:
  CreateNewVpcCondition:
    Fn::Equals:
      - NewVPC
      - Ref: VpcOption
  UseExistingVpcCondition:
    Fn::Equals:
      - ExistingVPC
      - Ref: VpcOption
  EnablePrivateZoneForNewVpcCondition:
    Fn::And:
      - Fn::Equals:
          - true
          - Ref: EnablePrivateZone
      - Fn::Equals:
          - NewVPC
          - Ref: VpcOption
  ExistingVpcNeedNewZoneCondition:
    Fn::And:
      - Fn::Equals:
          - true
          - Ref: EnablePrivateZone
      - Fn::Equals:
          - ExistingVPC
          - Ref: VpcOption
      - Fn::Equals:
          - true
          - Ref: NeedNewZoneForExistingVpc
  ExistingVpcReuseZoneCondition:
    Fn::And:
      - Fn::Equals:
          - true
          - Ref: EnablePrivateZone
      - Fn::Equals:
          - ExistingVPC
          - Ref: VpcOption
      - Fn::Not:
          Fn::Equals:
            - true
            - Ref: NeedNewZoneForExistingVpc
  EnablePublicIpConditions:
    Fn::Equals:
      - true
      - Ref: EnablePublicIp
  UseCustomAlbVSwitchCondition:
    Fn::And:
      - Fn::Equals:
          - true
          - Ref: EnableCustomAlbVSwitch
      - Fn::Equals:
          - ExistingVPC
          - Ref: VpcOption
  OpenClawVSwitch3NeedsRouteTable:
    Fn::Or:
      - Fn::Equals:
          - NewVPC
          - Ref: VpcOption
      - Fn::Not:
          Fn::Equals:
            - Ref: OpenClawVSwitchId2
            - Ref: OpenClawVSwitchId3
Locals:
  ExistingVpcZonesLocal:
    Type: DATASOURCE::PVTZ::Zones
    Properties:
      RefreshOptions: Always
      VpcId:
        Ref: VpcId
  ExistingZoneCount:
    Type: Eval
    Value:
      Fn::Jq:
        - First
        - Fn::Sub:
            - (. // []) | [.[] | select(.ZoneName == "${Domain}")] | length
            - Domain:
                Ref: E2BDomainAddress
        - Fn::GetAtt:
            - ExistingVpcZonesLocal
            - Zones
  NeedNewZoneForExistingVpc:
    Type: Eval
    Value:
      Fn::Equals:
        - Ref: ExistingZoneCount
        - 0
  ExistingPrivateZoneId:
    Type: Eval
    Value:
      Fn::Jq:
        - First
        - Fn::Sub:
            - (. // []) | [.[] | select(.ZoneName == "${Domain}")] | if length > 0 then .[0].ZoneId else "" end
            - Domain:
                Ref: E2BDomainAddress
        - Fn::GetAtt:
            - ExistingVpcZonesLocal
            - Zones
Parameters:
  WhitelistConfirmation:
    Type: String
    Label:
      en: Whitelist Confirmation
      zh-cn: 白名单配置确认
    AssociationProperty: AlertCheckbox
    Default: false
    AssociationPropertyMetadata:
      Description:
        zh-cn: |
          使用本服务前，请确保已为当前阿里云账号（UID）和部署 Region 完成白名单配置。白名单开通方式：
          <br/>
          1. 进技术支持群申请白名单，扫码进<a href="https://service-info-public.oss-cn-hangzhou.aliyuncs.com/openclaw-acs-tech-support.png" target="_blank">钉钉群</a>
          <br/>
          2. 提交工单加白：<a href="https://smartservice.console.aliyun.com/service/create-ticket" target="_blank">提交工单</a>
        en: |
          <strong>Important Prerequisite:</strong>
          Before using this service, please ensure that the whitelist has been configured for your Alibaba Cloud account (UID) and deployment Region. Whitelist activation methods:
          <br/>
          1. Join DingTalk group to apply for whitelist, scan QR code to join <a href="https://service-info-public.oss-cn-hangzhou.aliyuncs.com/openclaw-acs-tech-support.png" target="_blank">DingTalk group</a>
          <br/>
          2. Submit a ticket to add to whitelist: <a href="https://smartservice.console.aliyun.com/service/create-ticket" target="_blank">Submit a ticket</a>
      ConfirmText:
        zh-cn: 我已确认完成白名单配置
        en: I have confirmed the whitelist configuration
      Alert: true
      Type: warning
      MustChecked: true
