  VpcOption:
    Type: String
    AllowedValues:
      - NewVPC
      - ExistingVPC
    AssociationPropertyMetadata:
      ValueLabelMapping:
        NewVPC:
          zh-cn: 新建专有网络
          en: New VPC
        ExistingVPC:
          zh-cn: 已有专有网络
          en: Existing VPC
    Label:
      en: Select Existing or New VPC
      zh-cn: 选择已有/新建的专有网络
    Required: true
    Default: NewVPC
  ClusterOption:
    Type: String
    AllowedValues:
      - NewAcs
    AssociationPropertyMetadata:
      Visible: false
      ValueLabelMapping:
        NewAcs:
          zh-cn: 新建ACS集群
          en: New ACS
    Label:
      en: Select cluster type
      zh-cn: 选择集群类型
    Required: true
    Default: NewAcs
  VpcId:
    Type: String
    Label:
      en: VPC ID
      zh-cn: 专有网络VPC实例ID
    Description:
      en: Please search the ID starting with (vpc-xxx) from console-Virtual Private Cloud
      zh-cn: 现有虚拟专有网络的实例ID
    Required: true
    Default: Null
    AssociationProperty: ALIYUN::ECS::VPC::VPCId
    AssociationPropertyMetadata:
      RegionId: ${RegionId}
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  VpcCidrBlock:
    Type: String
    Label:
      en: VPC CIDR IPv4 Block
      zh-cn: 专有网络IPv4网段
    Description:
      zh-cn: VPC的ip地址段范围，<br>您可以使用以下的ip地址段或其子网:<br><font color='green'>[10.0.0.0/8]</font><br><font color='green'>[172.16.0.0/12]</font><br><font color='green'>[192.168.0.0/16]</font>
      en: 'The ip address range of the VPC in the CidrBlock form; <br>You can use the following ip address ranges and their subnets: <br><font color=''green''>[10.0.0.0/8]</font><br><font color=''green''>[172.16.0.0/12]</font><br><font color=''green''>[192.168.0.0/16]</font>'
    Default: 192.168.0.0/16
    Required: true
    AssociationProperty: ALIYUN::VPC::VPC::CidrBlock
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  VSwitchId1:
    Type: String
    Label:
      en: Business VSwitch ID 1
      zh-cn: 业务交换机实例ID 1
    Description:
      zh-cn: 业务网络交换机（可用区1），用于集群节点和普通业务 Pod。不能与 OpenClaw 专用交换机及其他业务交换机相同
      en: Business VSwitch in Zone 1, for cluster nodes and general business Pods. Must differ from OpenClaw VSwitches and other business VSwitches
    Required: true
    Default: Null
    AssociationProperty: ALIYUN::ECS::VSwitch::VSwitchId
    AssociationPropertyMetadata:
      VpcId: ${VpcId}
      ZoneId: ${ZoneId1}
      ExclusiveTo:
        - VSwitchId2
        - VSwitchId3
        - OpenClawVSwitchId1
        - OpenClawVSwitchId2
        - OpenClawVSwitchId3
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  VSwitchId2:
    Type: String
    Label:
      en: Business VSwitch ID 2
      zh-cn: 业务交换机实例ID 2
    Description:
      zh-cn: 业务网络交换机（可用区2），用于集群节点和普通业务 Pod。不能与 OpenClaw 专用交换机及其他业务交换机相同
      en: Business VSwitch in Zone 2, for cluster nodes and general business Pods. Must differ from OpenClaw VSwitches and other business VSwitches
    Required: true
    Default: Null
    AssociationProperty: ALIYUN::ECS::VSwitch::VSwitchId
    AssociationPropertyMetadata:
      VpcId: ${VpcId}
      ZoneId: ${ZoneId2}
      ExclusiveTo:
        - VSwitchId1
        - VSwitchId3
        - OpenClawVSwitchId1
        - OpenClawVSwitchId2
        - OpenClawVSwitchId3
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  VSwitchId3:
    Type: String
    Label:
      en: Business VSwitch ID 3
      zh-cn: 业务交换机实例ID 3
    Description:
      zh-cn: 业务网络交换机（可用区3），用于集群节点和普通业务 Pod。不能与 OpenClaw 专用交换机及其他业务交换机相同
      en: Business VSwitch in Zone 3, for cluster nodes and general business Pods. Must differ from OpenClaw VSwitches and other business VSwitches
    Required: true
    Default: Null
    AssociationProperty: ALIYUN::ECS::VSwitch::VSwitchId
    AssociationPropertyMetadata:
      VpcId: ${VpcId}
      ZoneId: ${ZoneId3}
      ExclusiveTo:
        - VSwitchId1
        - VSwitchId2
        - OpenClawVSwitchId1
        - OpenClawVSwitchId2
        - OpenClawVSwitchId3
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  VSwitchCidrBlock1:
    Type: String
    Label:
      en: Business VSwitch CIDR Block 1
      zh-cn: 业务交换机子网网段 1
    Description:
      zh-cn: 业务交换机网段（可用区1），必须属于VPC的子网段
      en: Business VSwitch CIDR in Zone 1, must belong to the subnet segment of VPC
    Default: 192.168.0.0/24
    Required: true
    AssociationProperty: ALIYUN::VPC::VSwitch::CidrBlock
    AssociationPropertyMetadata:
      VpcCidrBlock: VpcCidrBlock
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  VSwitchCidrBlock2:
    Type: String
    Label:
      en: Business VSwitch CIDR Block 2
      zh-cn: 业务交换机子网网段 2
    Description:
      zh-cn: 业务交换机网段（可用区2），必须属于VPC的子网段
      en: Business VSwitch CIDR in Zone 2, must belong to the subnet segment of VPC
    Default: 192.168.1.0/24
    Required: true
    AssociationProperty: ALIYUN::VPC::VSwitch::CidrBlock
    AssociationPropertyMetadata:
      VpcCidrBlock: VpcCidrBlock
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  VSwitchCidrBlock3:
    Type: String
    Label:
      en: Business VSwitch CIDR Block 3
      zh-cn: 业务交换机子网网段 3
    Description:
      zh-cn: 业务交换机网段（可用区3），必须属于VPC的子网段
      en: Business VSwitch CIDR in Zone 3, must belong to the subnet segment of VPC
    Default: 192.168.2.0/24
    Required: true
    AssociationProperty: ALIYUN::VPC::VSwitch::CidrBlock
    AssociationPropertyMetadata:
      VpcCidrBlock: VpcCidrBlock
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  OpenClawVSwitchId1:
    Type: String
    Label:
      en: OpenClaw VSwitch ID 1
      zh-cn: OpenClaw 专用交换机ID 1
    Description:
      zh-cn: OpenClaw 隔离网段交换机（可用区1），独立安全组，用于 Sandbox Pod 网络隔离。不能与业务交换机及其他 OpenClaw 交换机相同
      en: OpenClaw isolated VSwitch in Zone 1, with dedicated SecurityGroup for Sandbox Pod isolation. Must differ from business and other OpenClaw VSwitches
    Required: true
    Default: Null
    AssociationProperty: ALIYUN::ECS::VSwitch::VSwitchId
    AssociationPropertyMetadata:
      VpcId: ${VpcId}
      ZoneId: ${ZoneId1}
      ExclusiveTo:
        - OpenClawVSwitchId2
        - OpenClawVSwitchId3
        - VSwitchId1
        - VSwitchId2
        - VSwitchId3
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  OpenClawVSwitchId2:
    Type: String
    Label:
      en: OpenClaw VSwitch ID 2
      zh-cn: OpenClaw 专用交换机ID 2
    Description:
      zh-cn: OpenClaw 隔离网段交换机（可用区2），独立安全组，用于 Sandbox Pod 网络隔离。不能与业务交换机及其他 OpenClaw 交换机相同
      en: OpenClaw isolated VSwitch in Zone 2, with dedicated SecurityGroup for Sandbox Pod isolation. Must differ from business and other OpenClaw VSwitches
    Required: true
    Default: Null
    AssociationProperty: ALIYUN::ECS::VSwitch::VSwitchId
    AssociationPropertyMetadata:
      VpcId: ${VpcId}
      ZoneId: ${ZoneId2}
      ExclusiveTo:
        - OpenClawVSwitchId1
        - OpenClawVSwitchId3
        - VSwitchId1
        - VSwitchId2
        - VSwitchId3
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  OpenClawVSwitchId3:
    Type: String
    Label:
      en: OpenClaw VSwitch ID 3
      zh-cn: OpenClaw 专用交换机ID 3
    Description:
      zh-cn: OpenClaw 隔离网段交换机（可用区3），独立安全组，用于 Sandbox Pod 网络隔离。不能与业务交换机及其他 OpenClaw 交换机相同
      en: OpenClaw isolated VSwitch in Zone 3, with dedicated SecurityGroup for Sandbox Pod isolation. Must differ from business and other OpenClaw VSwitches
    Required: true
    Default: Null
    AssociationProperty: ALIYUN::ECS::VSwitch::VSwitchId
    AssociationPropertyMetadata:
      VpcId: ${VpcId}
      ZoneId: ${ZoneId3}
      ExclusiveTo:
        - OpenClawVSwitchId1
        - OpenClawVSwitchId2
        - VSwitchId1
        - VSwitchId2
        - VSwitchId3
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  OpenClawSecondaryCidrBlock:
    Type: String
    Label:
      en: OpenClaw Secondary CIDR Block
      zh-cn: OpenClaw 附加 VPC 网段
    Description:
      zh-cn: 新建 VPC 时需要为 OpenClaw 隔离网段添加附加 CIDR。此网段必须包含下方 3 个 OpenClaw 交换机网段。
      en: Secondary CIDR block for OpenClaw isolated subnets when creating a new VPC. Must contain all 3 OpenClaw VSwitch CIDRs below.
    Default: 10.8.0.0/16
    Required: true
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  OpenClawVSwitchCidrBlock1:
    Type: String
    Label:
      en: OpenClaw VSwitch CIDR Block 1
      zh-cn: OpenClaw 专用交换机网段 1
    Description:
      zh-cn: OpenClaw 隔离网段（可用区1），建议使用独立网段如 10.8.x.0/24，便于 TrafficPolicy 精细化控制
      en: OpenClaw isolated CIDR in Zone 1, recommend using dedicated range like 10.8.x.0/24 for TrafficPolicy control
    Default: 10.8.0.0/18
    Required: true
    AssociationProperty: ALIYUN::VPC::VSwitch::CidrBlock
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  OpenClawVSwitchCidrBlock2:
    Type: String
    Label:
      en: OpenClaw VSwitch CIDR Block 2
      zh-cn: OpenClaw 专用交换机网段 2
    Description:
      zh-cn: OpenClaw 隔离网段（可用区2），建议使用独立网段如 10.8.x.0/24，便于 TrafficPolicy 精细化控制
      en: OpenClaw isolated CIDR in Zone 2, recommend using dedicated range like 10.8.x.0/24 for TrafficPolicy control
    Default: 10.8.64.0/18
    Required: true
    AssociationProperty: ALIYUN::VPC::VSwitch::CidrBlock
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  OpenClawVSwitchCidrBlock3:
    Type: String
    Label:
      en: OpenClaw VSwitch CIDR Block 3
      zh-cn: OpenClaw 专用交换机网段 3
    Description:
      zh-cn: OpenClaw 隔离网段（可用区3），建议使用独立网段如 10.8.x.0/24，便于 TrafficPolicy 精细化控制
      en: OpenClaw isolated CIDR in Zone 3, recommend using dedicated range like 10.8.x.0/24 for TrafficPolicy control
    Default: 10.8.128.0/18
    Required: true
    AssociationProperty: ALIYUN::VPC::VSwitch::CidrBlock
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  EnableCustomAlbVSwitch:
    Type: Boolean
    Label:
      en: Use dedicated VSwitch for ALB
      zh-cn: 为 ALB 指定独立交换机
    Description:
      zh-cn: 开启后可为 ALB 单独指定交换机，与集群节点交换机隔离。仅在已有VPC场景下生效。
      en: When enabled, you can specify dedicated VSwitches for ALB, isolated from cluster node VSwitches. Only effective in ExistingVPC scenario.
    Default: false
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  AlbVSwitchId1:
    Type: String
    Label:
      en: ALB VSwitch ID (Zone 1)
      zh-cn: ALB 交换机ID（可用区1）
    Description:
      en: Dedicated VSwitch for ALB in Zone 1.
      zh-cn: ALB 在可用区1使用的专用交换机，须属于同一VPC。
    Required: false
    Default: Null
    AssociationProperty: ALIYUN::ECS::VSwitch::VSwitchId
    AssociationPropertyMetadata:
      VpcId: ${VpcId}
      ZoneId: ${ZoneId1}
      Visible:
        Condition:
          Fn::And:
            - Fn::Equals:
                - ExistingVPC
                - ${VpcOption}
            - Fn::Equals:
                - true
                - ${EnableCustomAlbVSwitch}
  AlbVSwitchId2:
    Type: String
    Label:
      en: ALB VSwitch ID (Zone 2)
      zh-cn: ALB 交换机ID（可用区2）
    Description:
      en: Dedicated VSwitch for ALB in Zone 2.
      zh-cn: ALB 在可用区2使用的专用交换机，须属于同一VPC。
    Required: false
    Default: Null
    AssociationProperty: ALIYUN::ECS::VSwitch::VSwitchId
    AssociationPropertyMetadata:
      VpcId: ${VpcId}
      ZoneId: ${ZoneId2}
      Visible:
        Condition:
          Fn::And:
            - Fn::Equals:
                - ExistingVPC
                - ${VpcOption}
            - Fn::Equals:
                - true
                - ${EnableCustomAlbVSwitch}
  ServiceCidr:
    Type: String
    Description:
      zh-cn: 可选范围：10.0.0.0/16-24，172.16-31.0.0/16-24，192.168.0.0/16-24<br>不能与 VPC 及 VPC 内已有 Kubernetes 集群使用的网段重复。<font color='blue'><b>创建成功后不能修改</b></font>
      en: 'Optional range: 10.0.0.0/16-24, 172.16-31.0.0/16-24, 192.168.0.0/16-24<br>Cannot duplicate segments already used by existing Kubernetes clusters in VPC.<font color=''blue''><b>Cannot be modified after successful creation</b></font>'
    Label:
      zh-cn: Service CIDR
      en: Service CIDR
    AssociationProperty: ALIYUN::CS::ManagedKubernetesCluster::ServiceCidr
    AssociationPropertyMetadata:
      ContainerCidr: 172.20.0.0/20
      VpcId: ${VpcId}
      RegionId: ${RegionId}
      ClusterType: ManagedKubernetes
      NodeCidrMask: 26
      Addons:
        - name: terway
    Default: 172.16.0.0/16
  InstanceType:
    Type: CommaDelimitedList
    Default:
      - ecs.g7.2xlarge
    AssociationProperty: ALIYUN::ECS::Instance::InstanceType
    AssociationPropertyMetadata:
      CreateACKClusterParams:
        NetworkPlugin: terway-eniip
      Constraints:
        InstanceTypeFamily:
          - ecs.c7
          - ecs.g7
          - ecs.r7
          - ecs.c7a
          - ecs.g7a
          - ecs.r7a
          - ecs.hfg9i
          - ecs.r9i
          - ecs.c9a
          - ecs.c9ae
    Label:
      en: Worker Instance Type
      zh-cn: Worker 节点实例规格
  WorkerSystemDiskSize:
    Default: 120
    Label: Worker节点系统盘大小(GB)
    Type: Number
    MinValue: 1
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewAck
            - ${ClusterOption}
  WorkerSystemDiskCategory:
    Type: String
    AssociationPropertyMetadata:
      LocaleKey: DiskCategory
      InstanceType: ${InstanceType}
      Visible:
        Condition:
          Fn::Equals:
            - NewAck
            - ${ClusterOption}
    Default: cloud_essd
    AllowedValues:
      - cloud_efficiency
      - cloud_ssd
      - cloud_essd
  InstancePassword:
    Default: Null
    NoEcho: true
    Type: String
    Description:
      en: Server login password, Length 8-30, must contain three(Capital letters, lowercase letters, numbers, special symbols)
      zh-cn: 服务器登录密码,长度8-30，必须包含三项（大写字母、小写字母、数字、特殊符号）
    Label:
      en: Instance Password
      zh-cn: 实例密码
    AllowedPattern: '[0-9A-Za-z\_\-\&:;''<>,=%`~!@#\(\)\$\^\*\+\|\{\}\[\]\.\?\/]+$'
    ConstraintDescription:
      en: Length 8-30, must contain three(Capital letters, lowercase letters, numbers, special symbols)
      zh-cn: 长度8-30，必须包含三项（大写字母、小写字母、数字、特殊符号）
    AssociationProperty: ALIYUN::ECS::Instance::Password
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewAck
            - ${ClusterOption}
  WorkerInstanceCount:
    Default: 3
    Type: Number
    Label:
      zh-cn: 实例节点数
      en: The count for cpu instance.
    MinValue: 3
    MaxValue: 5000
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::And:
            - Fn::Equals:
                - ${AutoScalingOption}
                - false
            - Fn::Equals:
                - NewAck
                - ${ClusterOption}
  WorkerInstanceMinCount:
    Default: 3
    Type: Number
    Label:
      zh-cn: 最小实例节点数
      en: The min count for cpu instance.
    MinValue: 3
    MaxValue: 5000
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::And:
            - Fn::Equals:
                - ${AutoScalingOption}
                - true
            - Fn::Equals:
                - NewAck
                - ${ClusterOption}
  WorkerInstanceMaxCount:
    Default: 10
    Type: Number
    Label:
      zh-cn: 最大实例节点数
      en: The max count for cpu instance.
    Description:
      en: If you want to enable automatic elastic scaling, the number of nodes must be greater than the minimum.
      zh-cn: 若需要启用自动弹性伸缩，需要大于最小节点数。
    MinValue: 3
    MaxValue: 5000
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::And:
            - Fn::Equals:
                - ${AutoScalingOption}
                - true
            - Fn::Equals:
                - NewAck
                - ${ClusterOption}
  AutoScalingOption:
    Type: Boolean
    Label:
      en: Whether to enable automatic elastic scaling of a node pool.
      zh-cn: 节点池是否启用自动弹性伸缩
    Description:
      zh-cn: 节点池若开启自动弹性伸缩，付费方式只能选择按量付费
      en: If automatic elastic expansion is enabled for a node pool, the payment mode can only be Postpaid
    Default: false
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewAck
            - ${ClusterOption}
  AckNetworkPlugin:
    Type: String
    Label:
      en: ACK plugin network
      zh-cn: ACK 网络插件
    AllowedValues:
      - terway
      - flannel
    Default: terway
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewAck
            - ${ClusterOption}
  E2BDomainAddress:
    Type: String
    Label:
      en: Sandbox Domain
      zh-cn: Sandbox 访问域名
    Description:
      en: Please enter a valid domain name
      zh-cn: 请输入有效的域名
    AllowedPattern: ^(?!-)[A-Za-z0-9-]{1,63}(?<!-)(\.[A-Za-z0-9-]{1,63}(?<!-))+$
    Default: agent-vpc.infra
  EnablePrivateZone:
    Type: Boolean
    Label:
      zh-cn: 是否配置内网域名解析
      en: Enable internal network domain name resolution
    Description:
      zh-cn: 若需要内网访问，需要通过PrivateZone配置内网域名解析。打开此配置会自动创建PrivateZone，并设置内网权威域名的生效范围为所选的VPC。
      en: If internal network access is required, configure internal domain name resolution through PrivateZone.
    Default: true
  TLSCert:
    Type: String
    Label:
      en: TLS Cert.
      zh-cn: TLS 证书
    Description:
      zh-cn: 证书对应的fullchain.pem文件
      en: The fullchain.pem file of the certificate
    NoEcho: true
    AssociationProperty: FileContent
    AssociationPropertyMetadata:
      AcceptFileSuffixes: .pem
  TLSSecret:
    Type: String
    Label:
      en: TLS Secret.
      zh-cn: TLS 证书密钥
    Description:
      zh-cn: 证书对应的privkey.pem文件
      en: The privkey.pem file of the certificate
    NoEcho: true
    AssociationProperty: FileContent
    AssociationPropertyMetadata:
      AcceptFileSuffixes: .pem
  AdminApiKey:
    Type: String
    Label:
      zh-cn: Sandbox API 访问密钥
      en: API Key for Sandbox Access
    AssociationProperty: AutoCompleteInput
    AssociationPropertyMetadata:
      Length: 32
      Prefix: e2b_
      CharacterClasses:
        - Class: lowercase
          min: 10
        - Class: number
          min: 10
    Default: Null
  SandboxManagerCpu:
    Type: Number
    Label:
      en: CPU resources for sandbox-manager
      zh-cn: Sandbox Manager CPU 资源
    Description:
      zh-cn: 为 sandbox-manager 分配的 CPU 核数
      en: CPU cores allocated for sandbox-manager
    Default: 2
    MinValue: 2
    MaxValue: 32
  SandboxManagerMemory:
    Type: String
    Label:
      en: Memory resources for sandbox-manager
      zh-cn: Sandbox Manager 内存资源
    Description:
      zh-cn: 为 sandbox-manager 分配的内存大小
      en: Memory allocated for sandbox-manager
    Default: 4Gi
  SandboxManagerScheduleToVirtualNode:
    Type: String
    Label:
      en: Schedule to Virtual Node
      zh-cn: Sandbox manager 调度到虚拟节点
    Description:
      zh-cn: 是否将 Sandbox Manager 调度到虚拟节点（ACS 模式），启用后 Sandbox Manager 将运行在 Serverless 虚拟节点上
      en: Whether to schedule Sandbox Manager to virtual nodes (ACS mode). When enabled, Sandbox Manager will run on Serverless virtual nodes
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
  SandboxNamespace:
    Type: String
    Label:
      en: Sandbox Namespace
      zh-cn: Sandbox 命名空间
    Description:
      zh-cn: SandboxSet（OpenClaw Pod）和 TestPod 所在的 Kubernetes 命名空间。sandbox-manager 固定部署在 sandbox-system，不受此参数影响
      en: Kubernetes namespace for SandboxSet (OpenClaw Pods) and TestPod. sandbox-manager is always deployed in sandbox-system
    Default: default
    AllowedPattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
    ConstraintDescription:
      zh-cn: 仅允许小写字母、数字和连字符，必须以字母或数字开头和结尾
      en: Only lowercase letters, digits and hyphens allowed, must start and end with a letter or digit
  OpenClawReplicas:
    Type: Number
    Label:
      en: OpenClaw Replicas
      zh-cn: OpenClaw 预热副本数
    Description:
      zh-cn: SandboxSet预热池中的沙箱副本数量
      en: Number of sandbox replicas in the SandboxSet warm pool
    Default: 1
    MinValue: 1
    MaxValue: 10
  OpenClawImage:
    Type: String
    Label:
      en: OpenClaw Image
      zh-cn: OpenClaw 镜像地址
    Description:
      zh-cn: OpenClaw 容器镜像地址，根据部署地域自动选择最优镜像源
      en: OpenClaw container image address, automatically selects optimal registry based on region
    AssociationProperty: TextArea
    AssociationPropertyMetadata:
      DynamicValue:
        - Condition:
            Fn::Contains:
              - - cn-beijing
                - cn-shanghai
                - cn-guangzhou
                - cn-hangzhou
                - ap-southeast-1
                - cn-hongkong
                - ap-northeast-1
              - ${RegionId}
          Value: registry-${RegionId}.ack.aliyuncs.com/ack-demo/openclaw:2026.3.23-2
        - Condition:
            Fn::Not:
              Fn::Contains:
                - - cn-beijing
                  - cn-shanghai
                  - cn-guangzhou
                  - cn-hangzhou
                  - ap-southeast-1
                  - cn-hongkong
                  - ap-northeast-1
                - ${RegionId}
          Value: registry-cn-hangzhou.ack.aliyuncs.com/ack-demo/openclaw:2026.3.23-2
  EnablePublicIp:
    Type: Boolean
    Description:
      en: Access sandbox-manager via the public network. (Alb enable the public ip)
      zh-cn: 通过公网访问sandbox-manager.(Alb 开启公网访问)
    Label:
      en: Whether to enable the public ip.
      zh-cn: 是否支持公网访问
    Default: false
Resources:
  Vpc:
    Type: ALIYUN::ECS::VPC
    Condition: CreateNewVpcCondition
    Properties:
      CidrBlock:
        Ref: VpcCidrBlock
      VpcName:
        Fn::Sub: openclaw-prod-vpc-${ALIYUN::StackName}
  VpcSecondaryCidr:
    Type: ALIYUN::VPC::VpcCidrBlockAssociation
    Condition: CreateNewVpcCondition
    Properties:
      VpcId:
        Fn::GetAtt:
          - Vpc
          - VpcId
      SecondaryCidrBlock:
        Ref: OpenClawSecondaryCidrBlock
  BusinessVSwitch1:
    Type: ALIYUN::ECS::VSwitch
    Condition: CreateNewVpcCondition
    Properties:
      ZoneId:
        Ref: ZoneId1
      VpcId:
        Fn::GetAtt:
          - Vpc
          - VpcId
      CidrBlock:
        Ref: VSwitchCidrBlock1
      VSwitchName:
        Fn::Sub: biz-vsw1-${ALIYUN::StackName}
  BusinessVSwitch2:
    Type: ALIYUN::ECS::VSwitch
    Condition: CreateNewVpcCondition
    Properties:
      ZoneId:
        Ref: ZoneId2
      VpcId:
        Fn::GetAtt:
          - Vpc
          - VpcId
      CidrBlock:
        Ref: VSwitchCidrBlock2
      VSwitchName:
        Fn::Sub: biz-vsw2-${ALIYUN::StackName}
  BusinessVSwitch3:
    Type: ALIYUN::ECS::VSwitch
    Condition: CreateNewVpcCondition
    Properties:
      ZoneId:
        Ref: ZoneId3
      VpcId:
        Fn::GetAtt:
          - Vpc
          - VpcId
      CidrBlock:
        Ref: VSwitchCidrBlock3
      VSwitchName:
        Fn::Sub: biz-vsw3-${ALIYUN::StackName}
  OpenClawVSwitch1:
    Type: ALIYUN::ECS::VSwitch
    Condition: CreateNewVpcCondition
    DependsOn: VpcSecondaryCidr
    Properties:
      ZoneId:
        Ref: ZoneId1
      VpcId:
        Fn::GetAtt:
          - Vpc
          - VpcId
      CidrBlock:
        Ref: OpenClawVSwitchCidrBlock1
      VSwitchName:
        Fn::Sub: openclaw-vsw1-${ALIYUN::StackName}
  OpenClawVSwitch2:
    Type: ALIYUN::ECS::VSwitch
    Condition: CreateNewVpcCondition
    DependsOn: VpcSecondaryCidr
    Properties:
      ZoneId:
        Ref: ZoneId2
      VpcId:
        Fn::GetAtt:
          - Vpc
          - VpcId
      CidrBlock:
        Ref: OpenClawVSwitchCidrBlock2
      VSwitchName:
        Fn::Sub: openclaw-vsw2-${ALIYUN::StackName}
  OpenClawVSwitch3:
    Type: ALIYUN::ECS::VSwitch
    Condition: CreateNewVpcCondition
    DependsOn: VpcSecondaryCidr
    Properties:
      ZoneId:
        Ref: ZoneId3
      VpcId:
        Fn::GetAtt:
          - Vpc
          - VpcId
      CidrBlock:
        Ref: OpenClawVSwitchCidrBlock3
      VSwitchName:
        Fn::Sub: openclaw-vsw3-${ALIYUN::StackName}
  OpenClawSecurityGroup:
    Type: ALIYUN::ECS::SecurityGroup
    Properties:
      VpcId:
        Fn::If:
          - CreateNewVpcCondition
          - Fn::GetAtt:
              - Vpc
              - VpcId
          - Ref: VpcId
      SecurityGroupName:
        Fn::Sub: openclaw-cluster-sg-${ALIYUN::StackName}
      Description: ACK 集群安全组（normal类型），保证集群基础组件正常运行
      SecurityGroupIngress:
        - IpProtocol: tcp
          PortRange: 6443/6443
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock1
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch1DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch1网段访问API Server 6443
        - IpProtocol: tcp
          PortRange: 6443/6443
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock2
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch2DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch2网段访问API Server 6443
        - IpProtocol: tcp
          PortRange: 6443/6443
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock3
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch3DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch3网段访问API Server 6443
        - IpProtocol: tcp
          PortRange: 9082/9082
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock1
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch1DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch1网段访问Poseidon 9082
        - IpProtocol: tcp
          PortRange: 9082/9082
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock2
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch2DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch2网段访问Poseidon 9082
        - IpProtocol: tcp
          PortRange: 9082/9082
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock3
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch3DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch3网段访问Poseidon 9082
  OpenClawIsolationSecurityGroup:
    Type: ALIYUN::ECS::SecurityGroup
    Properties:
      VpcId:
        Fn::If:
          - CreateNewVpcCondition
          - Fn::GetAtt:
              - Vpc
              - VpcId
          - Ref: VpcId
      SecurityGroupName:
        Fn::Sub: openclaw-isolation-sg-${ALIYUN::StackName}
      Description: OpenClaw Pod 隔离安全组（enterprise类型），通过 PodNetworking 关联到 OpenClaw Pod
      SecurityGroupType: enterprise
      SecurityGroupIngress:
        - IpProtocol: tcp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VpcCidrBlock
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - VpcDataSource
                      - Vpcs
          Priority: 1
          Description: 允许VPC主网段TCP全端口访问
        - IpProtocol: udp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VpcCidrBlock
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - VpcDataSource
                      - Vpcs
          Priority: 1
          Description: 允许VPC主网段UDP全端口访问
        - IpProtocol: tcp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock1
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch1DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch1 TCP(kubelet健康检查)
        - IpProtocol: udp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock1
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch1DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch1 UDP
        - IpProtocol: tcp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock2
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch2DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch2 TCP(kubelet健康检查)
        - IpProtocol: udp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock2
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch2DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch2 UDP
        - IpProtocol: tcp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock3
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch3DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch3 TCP(kubelet健康检查)
        - IpProtocol: udp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock3
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch3DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch3 UDP
        - IpProtocol: tcp
          PortRange: 1/65535
          SourceCidrIp: 100.64.0.0/10
          Priority: 1
          Description: 允许云产品网段TCP(metadata/DNS/ACR/SLB)
        - IpProtocol: udp
          PortRange: 1/65535
          SourceCidrIp: 100.64.0.0/10
          Priority: 1
          Description: 允许云产品网段UDP(metadata/DNS/ACR/SLB)
      SecurityGroupEgress:
        - IpProtocol: tcp
          PortRange: 1/65535
          DestCidrIp: 100.64.0.0/10
          Priority: 1
          Description: 允许云产品网段TCP(metadata/DNS/ACR/SLB)
        - IpProtocol: udp
          PortRange: 1/65535
          DestCidrIp: 100.64.0.0/10
          Priority: 1
          Description: 允许云产品网段UDP(metadata/DNS/ACR/SLB)
        - IpProtocol: tcp
          PortRange: 6443/6443
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VpcCidrBlock
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - VpcDataSource
                      - Vpcs
          Priority: 2
          Description: 允许访问API Server 6443(VPC主网段)
        - IpProtocol: tcp
          PortRange: 6443/6443
          DestCidrIp:
            Ref: ServiceCidr
          Priority: 2
          Description: 允许访问API Server 6443(ServiceCIDR)
        - IpProtocol: tcp
          PortRange: 9082/9082
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VpcCidrBlock
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - VpcDataSource
                      - Vpcs
          Priority: 2
          Description: 允许访问Poseidon 9082(VPC主网段)
        - IpProtocol: tcp
          PortRange: 10250/10255
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VpcCidrBlock
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - VpcDataSource
                      - Vpcs
          Priority: 2
          Description: 允许kubelet通信TCP(VPC主网段)
        - IpProtocol: tcp
          PortRange: 53/53
          DestCidrIp:
            Ref: ServiceCidr
          Priority: 2
          Description: 允许kube-dns TCP
        - IpProtocol: udp
          PortRange: 53/53
          DestCidrIp:
            Ref: ServiceCidr
          Priority: 2
          Description: 允许kube-dns UDP
        - IpProtocol: tcp
          PortRange: 53/53
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VpcCidrBlock
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - VpcDataSource
                      - Vpcs
          Priority: 2
          Description: 允许VPC内DNS TCP
        - IpProtocol: udp
          PortRange: 53/53
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VpcCidrBlock
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - VpcDataSource
                      - Vpcs
          Priority: 2
          Description: 允许VPC内DNS UDP
        - IpProtocol: tcp
          PortRange: 1/65535
          DestCidrIp: 0.0.0.0/0
          Priority: 100
          Description: 允许公网TCP
        - IpProtocol: udp
          PortRange: 1/65535
          DestCidrIp: 0.0.0.0/0
          Priority: 100
          Description: 允
  Sleep:
    Type: ALIYUN::ROS::Sleep
    DependsOn:
      - AckCluster
    Properties:
      CreateDuration: 10
  AckCluster:
    Type: ALIYUN::CS::ManagedKubernetesCluster
    Properties:
      Name:
