        Fn::GetAtt:
          - OpenClawNatGateway
          - SNatTableId
      SnatIp:
        Fn::GetAtt:
          - OpenClawNatEip
          - EipAddress
      SourceVSwitchIds:
        - Fn::If:
            - CreateNewVpcCondition
            - Fn::GetAtt:
                - OpenClawVSwitch3
                - VSwitchId
            - Ref: OpenClawVSwitchId3
      SnatEntryName: openclaw-snat-vsw3
  ClusterAppliaction:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn: AddonSleep
    Properties:
      DefaultNamespace: sandbox-system
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: v1
            kind: Secret
            type: kubernetes.io/tls
            metadata:
              name: sandbox-manager-tls
              namespace: sandbox-system
            data:
              tls.crt: ${TLSCertString}
              tls.key: ${TLSSecretString}
          - TLSCertString:
              Fn::Base64Encode:
                Ref: TLSCert
            TLSSecretString:
              Fn::Base64Encode:
                Ref: TLSSecret
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
  LoongCollectorSeesionCR:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn: AddonSleep
    Properties:
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: telemetry.alibabacloud.com/v1alpha1
            kind: ClusterAliyunPipelineConfig
            metadata:
              name: openclaw-session-config
            spec:
              config:
                aggregators: []
                global:
                  TopicType: filepath
                  TopicFormat: .*/sessions/(?P<__session_id__>.*?).jsonl
                inputs:
                  - Type: input_file
                    FilePaths:
                      - /root/.openclaw/agents/*/sessions/*.jsonl
                    MaxDirSearchDepth: 0
                    FileEncoding: utf8
                    EnableContainerDiscovery: true
                    ContainerFilters:
                      K8sPodRegex: ^(openclaw.*)$
                processors:
                  - Type: processor_parse_json_native
                    SourceKey: content
                flushers:
                  - Type: flusher_sls
                    Logstore: openclaw-session
                sample: ''
              logstores:
                - encryptConf: {}
                  name: openclaw-session
                  productCode: openclaw_audit
              machineGroups:
                - name: k8s-group-${ClusterId}
              project:
                name: k8s-log-${ClusterId}
          - ClusterId:
              Fn::GetAtt:
                - AckCluster
                - ClusterId
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
  LoongCollectorRuntimeCR:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn: AddonSleep
    Properties:
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: telemetry.alibabacloud.com/v1alpha1
            kind: ClusterAliyunPipelineConfig
            metadata:
              name: openclaw-runtime-config
            spec:
              config:
                flushers:
                  - Logstore: openclaw-runtime
                    Type: flusher_sls
                global: {}
                inputs:
                  - ContainerFilters:
                      K8sPodRegex: ^(openclaw.*)$
                    EnableContainerDiscovery: true
                    FileEncoding: utf8
                    FilePaths:
                      - /tmp/openclaw/*.log
                    MaxDirSearchDepth: 0
                    Type: input_file
                processors:
                  - SourceKey: content
                    Type: processor_parse_json_native
              logstores:
                - encryptConf: {}
                  name: openclaw-runtime
                  productCode: openclaw_gateway
              machineGroups:
                - name: k8s-group-${ClusterId}
              project:
                name: k8s-log-${ClusterId}
          - ClusterId:
              Fn::GetAtt:
                - AckCluster
                - ClusterId
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
  GlobalTrafficPolicyApplication:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn: AddonSleep
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace: default
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: network.alibabacloud.com/v1alpha1
            kind: GlobalTrafficPolicy
            metadata:
              name: global-black-list
            spec:
              priority: 1000
              selector: {}
              ingress:
                rules:
                  - action: deny
                    from:
                      - cidr: ${OpenClawVSwitchCidr1}
                      - cidr: ${OpenClawVSwitchCidr2}
                      - cidr: ${OpenClawVSwitchCidr3}
                  - action: allow
                    from:
                      - cidr: 0.0.0.0/0
              egress:
                rules:
                  - action: allow
                    to:
                      - cidr: 0.0.0.0/0
          - OpenClawVSwitchCidr1:
              Fn::If:
                - CreateNewVpcCondition
                - Ref: OpenClawVSwitchCidrBlock1
                - Fn::Jq:
                    - First
                    - .[0].CidrBlock
                    - Fn::GetAtt:
                        - OpenClawVSwitch1DataSource
                        - VSwitches
            OpenClawVSwitchCidr2:
              Fn::If:
                - CreateNewVpcCondition
                - Ref: OpenClawVSwitchCidrBlock2
                - Fn::Jq:
                    - First
                    - .[0].CidrBlock
                    - Fn::GetAtt:
                        - OpenClawVSwitch2DataSource
                        - VSwitches
            OpenClawVSwitchCidr3:
              Fn::If:
                - CreateNewVpcCondition
                - Ref: OpenClawVSwitchCidrBlock3
                - Fn::Jq:
                    - First
                    - .[0].CidrBlock
                    - Fn::GetAtt:
                        - OpenClawVSwitch3DataSource
                        - VSwitches
  OpenClawTrafficPolicyApplication:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn: AddonSleep
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace:
        Ref: SandboxNamespace
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: network.alibabacloud.com/v1alpha1
            kind: TrafficPolicy
            metadata:
              name: openclaw-policy
              namespace: ${SandboxNamespace}
            spec:
              priority: 100
              selector:
                matchLabels:
                  app: openclaw
              ingress:
                rules:
                  - action: allow
                    from:
                      - service:
                          name: sandbox-gateway
                          namespace: sandbox-system
                  - action: allow
                    from:
                      - service:
                          name: sandbox-manager
                          namespace: sandbox-system
                  - action: deny
                    from:
                      - cidr: 0.0.0.0/0
              egress:
                rules:
                  # 1. 拒绝访问 ECS metadata（安全加固）
                  - action: deny
                    to:
                      - cidr: 100.100.100.200/32
                  # 2. 允许 kube-dns（K8s Service 方式，ECI 实际不走此路径）
                  - action: allow
                    to:
                      - service:
                          name: kube-dns
                          namespace: kube-system
                  # 3. 允许 VPC DNS（ECI Pod 实际使用的 DNS 通道）
                  - action: allow
                    to:
                      - cidr: 100.100.2.136/32
                      - cidr: 100.100.2.138/32
                  # 4. 允许阿里云内部服务网段（VPC 内网镜像仓库 100.103.x.x、VPC DNS 等）
                  # metadata 100.100.100.200 已在规则1中 deny，此处放行不受影响
                  - action: allow
                    to:
                      - cidr: 100.64.0.0/10
                  # 5. 允许访问 VPC 主网段（Poseidon 管控面 9082、API Server 6443）
                  - action: allow
                    to:
                      - cidr: ${VpcCidr}
                  # 6. 拒绝所有其他内网访问（Pod 间隔离核心规则）
                  - action: deny
                    to:
                      - cidr: 172.16.0.0/12
                      - cidr: 192.168.0.0/16
                      - cidr: 10.0.0.0/8
                  # 6. 允许公网访问
                  - action: allow
                    to:
                      - cidr: 0.0.0.0/0
          - SandboxNamespace:
              Ref: SandboxNamespace
            VpcCidr:
              Ref: VpcCidrBlock
  OpenClawPodNetworking:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn:
      - VirtualNodeSleep
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: network.alibabacloud.com/v1beta1
            kind: PodNetworking
            metadata:
              name: openclaw-network
            spec:
              allocationType:
                type: Elastic
              selector:
                podSelector:
                  matchLabels:
                    app: openclaw
              securityGroupIDs:
                - "${OpenClawSecurityGroupId}"
              vSwitchOptions:
                - "${OpenClawVSwitchId1}"
                - "${OpenClawVSwitchId2}"
                - "${OpenClawVSwitchId3}"
          - OpenClawSecurityGroupId:
              Fn::GetAtt:
                - OpenClawIsolationSecurityGroup
                - SecurityGroupId
            OpenClawVSwitchId1:
              Fn::If:
                - CreateNewVpcCondition
                - Fn::GetAtt:
                    - OpenClawVSwitch1
                    - VSwitchId
                - Ref: OpenClawVSwitchId1
            OpenClawVSwitchId2:
              Fn::If:
                - CreateNewVpcCondition
                - Fn::GetAtt:
                    - OpenClawVSwitch2
                    - VSwitchId
                - Ref: OpenClawVSwitchId2
            OpenClawVSwitchId3:
              Fn::If:
                - CreateNewVpcCondition
                - Fn::GetAtt:
                    - OpenClawVSwitch3
                    - VSwitchId
                - Ref: OpenClawVSwitchId3
  OpenClawSandboxSet:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn:
      - ClusterAppliaction
      - AddonSleep
      - GlobalTrafficPolicyApplication
      - OpenClawTrafficPolicyApplication
      - OpenClawPodNetworking
    Properties:
      DefaultNamespace:
        Ref: SandboxNamespace
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: agents.kruise.io/v1alpha1
            kind: SandboxSet
            metadata:
              name: openclaw
              namespace: ${SandboxNamespace}
            spec:
              persistentContents:
                - filesystem
              replicas: ${OpenClawReplicas}
              template:
                metadata:
                  labels:
                    app: openclaw
                    alibabacloud.com/acs: "true"
                  annotations:
                    ops.alibabacloud.com/pause-enabled: "true"
                    k8s.aliyun.com/eci-network-policy-enable: "true"
                    network.alibabacloud.com/enable-network-policy-agent: "true"
                    network.alibabacloud.com/network-policy-mode: "traffic-policy"
                spec:
                  automountServiceAccountToken: false
                  enableServiceLinks: false
                  hostNetwork: false
                  hostPID: false
                  hostIPC: false
                  shareProcessNamespace: false
                  hostname: openclaw
                  dnsPolicy: None
                  dnsConfig:
                    nameservers:
                      - "100.100.2.136"
                      - "100.100.2.138"
                    searches:
                      - default.svc.cluster.local
                      - svc.cluster.local
                      - cluster.local
                    options:
                      - name: ndots
                        value: "5"
                  nodeSelector:
                    type: virtual-kubelet
                  tolerations:
                    - key: virtual-kubelet.io/provider
                      operator: Exists
                      effect: NoSchedule
                  initContainers:
                    - name: tini-copy
                      image: kube-ai-registry.cn-shanghai.cr.aliyuncs.com/kube-ai/ubuntu-tini:krallin-ubuntu-tini-latest
                      command: ["sh", "-c"]
                      args:
                        - |
                          cp /usr/bin/tini /mnt/tini/tini
                          chmod +x /mnt/tini/tini
                      volumeMounts:
                        - name: tini-volume
                          mountPath: /mnt/tini
                    - name: init
                      image: "${InitImage}"
                      command: [ "sh", "/workspace/entrypoint_inner.sh" ]
                      volumeMounts:
                        - name: envd-volume
                          mountPath: /mnt/envd
                      env:
                        - name: ENVD_DIR
                          value: /mnt/envd
                        - name: __IGNORE_RESOURCE__
                          value: "true"
                      restartPolicy: Always
                  containers:
                    - name: gateway
                      image: "${OpenClawImage}"
                      securityContext:
                        readOnlyRootFilesystem: false
                        runAsUser: 0
                        runAsGroup: 0
                      command: ["/mnt/tini/tini", "--"]
                      args:
                        - bash
                        - -c
                        - |
                          exec node openclaw.mjs gateway run --allow-unconfigured
                      ports:
                        - name: gateway
                          containerPort: 18789
                          protocol: TCP
                        - name: runtime
                          containerPort: 49983
                          protocol: TCP
                      env:
                        - name: ENVD_DIR
                          value: /mnt/envd
                        - name: OPENCLAW_CONFIG_DIR
                          value: /root/.openclaw
                        - name: KUBERNETES_SERVICE_PORT_HTTPS
                          value: ""
                        - name: KUBERNETES_SERVICE_PORT
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP_PROTO
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP_ADDR
                          value: ""
                        - name: KUBERNETES_SERVICE_HOST
                          value: ""
                        - name: KUBERNETES_PORT
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP_PORT
                          value: ""
                      volumeMounts:
                        - name: envd-volume
                          mountPath: /mnt/envd
                        - name: tini-volume
                          mountPath: /mnt/tini
                      resources:
                        requests:
                          cpu: 2
                          memory: 4Gi
                        limits:
                          cpu: 2
                          memory: 4Gi
                      lifecycle:
                        postStart:
                          exec:
                            command:
                              - bash
                              - /mnt/envd/envd-run.sh
                      startupProbe:
                        exec:
                          command:
                            - node
                            - -e
                            - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
                        initialDelaySeconds: 60
                        periodSeconds: 30
                        failureThreshold: 30
                      # livenessProbe:
                      #   exec:
                      #     command:
                      #       - node
                      #       - -e
                      #       - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
                      #   initialDelaySeconds: 60
                      #   periodSeconds: 30
                      #   timeoutSeconds: 10
                      # readinessProbe:
                      #   exec:
                      #     command:
                      #       - node
                      #       - -e
                      #       - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
                      #   initialDelaySeconds: 15
                      #   periodSeconds: 10
                      #   timeoutSeconds: 5
                  terminationGracePeriodSeconds: 1
                  volumes:
                    - name: envd-volume
                      emptyDir: { }
                    - name: tini-volume
                      emptyDir: { }
          - SandboxNamespace:
              Ref: SandboxNamespace
            OpenClawReplicas:
              Ref: OpenClawReplicas
            OpenClawImage:
              Ref: OpenClawImage
            InitImage:
              Fn::Sub:
                - registry-${RegionId}-vpc.ack.aliyuncs.com/acs/agent-runtime:v0.0.2
                - RegionId:
                    Ref: ALIYUN::Region
      WaitUntil:
        - Kind: SandboxSet
          ApiVersion: agents.kruise.io/v1alpha1
          Name: openclaw
          Namespace:
            Ref: SandboxNamespace
          JsonPath: $.status.availableReplicas
          Operator: NotEmpty
          Timeout: 600
          FirstMatch: true
  EditAlbConfigServiceAccount:
    Type: ALIYUN::CS::ClusterApplication
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: 'edit-alb-config-sa'
          namespace: "sandbox-system"
  EditAlbConfigRole:
    Type: ALIYUN::CS::ClusterApplication
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: 'edit-alb-config-role'
          namespace: "sandbox-system"
        rules:
        - apiGroups: ["alibabacloud.com"]
          resources: ["albconfigs"]
          verbs: ["get", "list", "update","patch"]
  EditAlbConfigBinding:
    Type: ALIYUN::CS::ClusterApplication
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: "edit-alb-config-rolebinding"
          namespace: "sandbox-system"
        subjects:
        - kind: ServiceAccount
          name: 'edit-alb-config-sa'
          namespace: "sandbox-system"
        roleRef:
          kind: ClusterRole
          name: 'edit-alb-config-role'
          apiGroup: rbac.authorization.k8s.io
  EditAlbConfigJob:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn:
      - AddonSleep
      - EditAlbConfigBinding
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: edit-alb-config-job
        spec:
          template:
            metadata:
              name: edit-alb-config-job
            spec:
              serviceAccountName: edit-alb-config-sa
              restartPolicy: Never
              containers:
              - name: edit-alb-config-job
                image: compute-nest-registry.cn-hangzhou.cr.aliyuncs.com/public/dtzar/helm-kubectl:3.12.0
                command: [ "/bin/sh", "-c", "--" ]
                args:
                  - |
                    set -x
                    echo "开始修改 AlbConfig 资源：alb"
                    kubectl patch albconfig.alibabacloud.com alb --type='json' -p='[{"op":"add","path":"/spec/listeners/-","value":{"port":443,"protocol":"HTTPS","requestTimeout":600}}]'
  TestPod:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn:
      - OpenClawSandboxSet
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace:
        Ref: SandboxNamespace
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: v1
            kind: Pod
            metadata:
              name: acs-sandbox-test-pod
              namespace: ${SandboxNamespace}
              labels:
                app: acs-sandbox-test-pod
                alibabacloud.com/acs: "true"
            spec:
              nodeSelector:
                type: virtual-kubelet
              tolerations:
                - key: virtual-kubelet.io/provider
                  operator: Exists
                  effect: NoSchedule
              containers:
                - name: acs-sandbox-test-pod
                  image: compute-nest-registry.cn-hangzhou.cr.aliyuncs.com/computenest/acs-sandbox-test-pod:2.0.0
                  imagePullPolicy: Always
                  env:
                    - name: E2B_API_KEY
                      value: ${AdminApiKey}
                    - name: E2B_DOMAIN
                      value: ${E2BDomainAddress}
                    - name: SSL_CERT_FILE
                      value: "${TLSCert}"
              restartPolicy: Never
          - SandboxNamespace:
              Ref: SandboxNamespace
            AdminApiKey:
              Ref: AdminApiKey
            E2BDomainAddress:
              Ref: E2BDomainAddress
            TLSCert:
              Ref: TLSCert
  PrivateZone:
    Condition: EnablePrivateZoneForNewVpcCondition
    Type: ALIYUN::PVTZ::Zone
    DependsOn: Vpc
    Properties:
      ProxyPattern: ZONE
      ZoneName:
        Ref: E2BDomainAddress
  PrivateZoneVpcBinder:
    Condition: EnablePrivateZoneForNewVpcCondition
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    Properties:
      Vpcs:
        - RegionId:
            Ref: ALIYUN::Region
          VpcId:
            Fn::GetAtt:
              - Vpc
              - VpcId
      ZoneId:
        Fn::GetAtt:
          - PrivateZone
          - ZoneId
  PrivateZoneCnameRecord:
    Condition: EnablePrivateZoneForNewVpcCondition
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn:
      - PrivateZoneVpcBinder
      - AlbDataSource
    Properties:
      ZoneId:
        Fn::GetAtt:
          - PrivateZone
          - ZoneId
      Rr: '*'
      Type: CNAME
      Value:
        Fn::Jq:
          - First
          - .[0].DNSName
          - Fn::GetAtt:
              - AlbDataSource
              - LoadBalancers
  PrivateZoneForExistingVpc:
    Condition: ExistingVpcNeedNewZoneCondition
    Type: ALIYUN::PVTZ::Zone
    Properties:
      ProxyPattern: ZONE
      ZoneName:
        Ref: E2BDomainAddress
  PrivateZoneVpcBinderForExistingVpc:
    Condition: ExistingVpcNeedNewZoneCondition
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    Properties:
      Vpcs:
        - RegionId:
            Ref: ALIYUN::Region
          VpcId:
            Ref: VpcId
      ZoneId:
        Fn::GetAtt:
          - PrivateZoneForExistingVpc
          - ZoneId
  ExistingVpcNewZoneCnameRecord:
    Condition: ExistingVpcNeedNewZoneCondition
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn:
      - PrivateZoneVpcBinderForExistingVpc
      - AlbDataSource
    Properties:
      ZoneId:
        Fn::GetAtt:
          - PrivateZoneForExistingVpc
          - ZoneId
      Rr: '*'
      Type: CNAME
      Value:
        Fn::Jq:
          - First
          - .[0].DNSName
          - Fn::GetAtt:
              - AlbDataSource
              - LoadBalancers
  ExistingVpcReuseZoneCnameRecord:
    Condition: ExistingVpcReuseZoneCondition
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn:
      - AlbDataSource
    Properties:
      ZoneId:
        Ref: ExistingPrivateZoneId
      Rr: '*'
      Type: CNAME
      Value:
        Fn::Jq:
          - First
          - .[0].DNSName
          - Fn::GetAtt:
              - AlbDataSource
              - LoadBalancers
