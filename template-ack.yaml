ROSTemplateFormatVersion: '2015-09-01'
Description:
  en: Production deployment of OpenClaw to ACK cluster with VirtualNode (ACS), 2-AZ, 4 VSwitches (2 business + 2 OpenClaw isolated), SecurityGroup isolation, Poseidon TrafficPolicy
  zh-cn: 生产环境部署OpenClaw到ACK+VirtualNode(ACS)集群，2可用区、4交换机（2业务+2 OpenClaw隔离网段）、安全组网络隔离、Poseidon TrafficPolicy网络策略
Conditions:
  CreateNewVpcCondition:
    Fn::Equals:
      - NewVPC
      - Ref: VpcOption
  UseExistingVpcCondition:
    Fn::Equals:
      - ExistingVPC
      - Ref: VpcOption
  # PrivateZone 启用条件（NewVPC 场景：始终创建新 Zone）
  EnablePrivateZoneForNewVpcCondition:
    Fn::And:
      - Fn::Equals:
          - true
          - Ref: EnablePrivateZone
      - Fn::Equals:
          - NewVPC
          - Ref: VpcOption
  # PrivateZone 启用条件（ExistingVPC + 无同名 Zone：需要创建新 Zone + 绑定 VPC + CNAME）
  ExistingVpcNeedNewZoneCondition:
    Fn::And:
      - Fn::Equals:
          - true
          - Ref: EnablePrivateZone
      - Fn::Equals:
          - ExistingVPC
          - Ref: VpcOption
      - Fn::Equals:
          - true
          - Ref: NeedNewZoneForExistingVpc
  # PrivateZone 启用条件（ExistingVPC + 已有同名 Zone：复用已有 ZoneId，只添加 CNAME）
  ExistingVpcReuseZoneCondition:
    Fn::And:
      - Fn::Equals:
          - true
          - Ref: EnablePrivateZone
      - Fn::Equals:
          - ExistingVPC
          - Ref: VpcOption
      - Fn::Not:
          Fn::Equals:
            - true
            - Ref: NeedNewZoneForExistingVpc
  EnableCmsObservabilityCondition:
    Fn::Equals:
      - true
      - Ref: EnableCmsObservability
  EnableOpenClawNatCondition:
    Fn::Equals:
      - true
      - Ref: EnableOpenClawNat
  EnablePublicIpConditions:
    Fn::Equals:
      - true
      - Ref: EnablePublicIp
  UseCustomAlbVSwitchCondition:
    Fn::And:
      - Fn::Equals:
          - true
          - Ref: EnableCustomAlbVSwitch
      - Fn::Equals:
          - ExistingVPC
          - Ref: VpcOption
  # NewVPC 场景下，当 OpenClaw VSwitch 网段不在 VPC 主 CIDR 内时，才需要添加附加 CIDR
  NeedSecondaryCidrCondition:
    Fn::And:
      - Fn::Equals:
          - NewVPC
          - Ref: VpcOption
      - Fn::Equals:
          - 'false'
          - Ref: OpenClawCidrInVpc
Locals:
  # ========== NewVPC 场景：判断 OpenClaw VSwitch 网段是否需要通过附加 CIDR 添加 ==========
  # 当 OpenClaw VSwitch 网段已在 VPC 主 CIDR 内时，不需要添加 VpcSecondaryCidr
  # 例如：VPC=10.0.0.0/8 + OpenClaw=10.8.0.0/18 → 已包含，跳过附加 CIDR
  #       VPC=192.168.0.0/16 + OpenClaw=10.8.0.0/18 → 不包含，需要附加 CIDR
  # ========== ExistingVPC 场景：查询已绑定该 VPC 的 PrivateZone，判断是否需要创建新 Zone ==========
  # Step 1: 查询已绑定指定 VPC 的 PrivateZone（DATASOURCE 类型 Locals）
  # 通过 VpcId 过滤，只返回已绑定该 VPC 的 Zone
  # NewVPC 场景下 VpcId 为空，ROS 不会执行此数据源查询
  # 复用路径下查到的 Zone 一定已绑定该 VPC，无需再执行 ZoneVpcBinder
  ExistingVpcZonesLocal:
    Type: DATASOURCE::PVTZ::Zones
    Properties:
      RefreshOptions: Always
      VpcId:
        Ref: VpcId
  # Step 2: 计算同名 Zone 的数量（空数组安全：. // [] 防止 null 输入）
  # 返回匹配域名的 Zone 数量（0 = 无同名 Zone，>0 = 有同名 Zone）
  ExistingZoneCount:
    Type: Eval
    Value:
      Fn::Jq:
        - First
        - Fn::Sub:
            - '(. // []) | [.[] | select(.ZoneName == "${Domain}")] | length'
            - Domain:
                Ref: E2BDomainAddress
        - Fn::GetAtt:
            - ExistingVpcZonesLocal
            - Zones
  # Step 3: 计算是否需要创建新 Zone（布尔值，供 Conditions 引用）
  # true = 无同名 Zone 需要新建，false = 有同名 Zone 可以复用
  NeedNewZoneForExistingVpc:
    Type: Eval
    Value:
      Fn::Equals:
        - Ref: ExistingZoneCount
        - 0
  # Step 4: 提取已有同名 Zone 的 ZoneId（无匹配时为空字符串 ""）
  ExistingPrivateZoneId:
    Type: Eval
    Value:
      Fn::Jq:
        - First
        - Fn::Sub:
            - '(. // []) | [.[] | select(.ZoneName == "${Domain}")] | if length > 0 then .[0].ZoneId else "" end'
            - Domain:
                Ref: E2BDomainAddress
        - Fn::GetAtt:
            - ExistingVpcZonesLocal
            - Zones
  # ========== 判断 OpenClaw VSwitch 网段是否已在 VPC 主 CIDR 内（决定是否需要添加附加 CIDR） ==========
  # 使用按位运算判断 CIDR 包含关系：将 IP 转为 32 位整数，用 VPC 掩码做整数除法模拟按位与
  # 算法：VpcMask <= SubnetMask 且 floor(VpcIP / 2^(32-VpcMask)) == floor(SubnetIP / 2^(32-VpcMask))
  # true = OpenClaw 网段已在 VPC 主 CIDR 内，不需要附加 CIDR
  # false = OpenClaw 网段不在 VPC 主 CIDR 内，需要附加 CIDR
  OpenClawCidrInVpc:
    Type: Eval
    Value:
      Fn::Jq:
        - First
        - '(.[0] | split("/") | .[0] | split(".") | map(tonumber)) as $vo | (.[0] | split("/") | .[1] | tonumber) as $vm | (.[1] | split("/") | .[0] | split(".") | map(tonumber)) as $so | (.[1] | split("/") | .[1] | tonumber) as $sm | ($vo[0]*16777216 + $vo[1]*65536 + $vo[2]*256 + $vo[3]) as $vi | ($so[0]*16777216 + $so[1]*65536 + $so[2]*256 + $so[3]) as $si | pow(2; 32 - $vm) as $d | if $vm > $sm then "false" else if (($vi / $d) | floor) == (($si / $d) | floor) then "true" else "false" end end'
        - - Ref: VpcCidrBlock
          - Ref: OpenClawVSwitchCidrBlock1
Parameters:
  # ==================== 前置确认 ====================
  WhitelistConfirmation:
    Type: String
    Label:
      en: Whitelist Confirmation
      zh-cn: 前置确认
    AssociationProperty: AlertCheckbox
    Default: false
    AssociationPropertyMetadata:
      Description:
        zh-cn: |
          使用本服务前，请确保阅读<a href="https://computenest.console.aliyun.com/service/detail/cn-hangzhou/service-56531b838b524f5a83da/?isInstance=true" target="_blank">服务部署和使用文档</a>：
          <br/>
          1. 可选择进技术支持群，扫码进<a href="https://service-info-public.oss-cn-hangzhou.aliyuncs.com/openclaw-acs-tech-support.png" target="_blank">钉钉群</a>
          <br/>
        en: |
          To ensure smooth end-to-end usage of this service, please join the following tech support group:
          <br/>
          1. Join DingTalk group after service instance creation, scan QR code to join <a href="https://service-info-public.oss-cn-hangzhou.aliyuncs.com/openclaw-acs-tech-support.png" target="_blank">DingTalk group</a>
          <br/>
      ConfirmText:
        zh-cn: 我已阅读服务部署和使用文档，确认可进行部署
        en: I have read the deployment documentation and confirm I am ready to deploy
      Alert: true
      Type: warning
      MustChecked: true
  # ==================== 可用区配置（2 可用区） ====================
  ZoneId1:
    Type: String
    AssociationProperty: ALIYUN::ECS::Instance:ZoneId
    Default: Null
    Required: true
    AllowedValues:
      - cn-hangzhou-b
      - cn-hangzhou-g
      - cn-hangzhou-h
      - cn-hangzhou-i
      - cn-hangzhou-j
      - cn-hangzhou-k
      - cn-beijing-f
      - cn-beijing-g
      - cn-beijing-h
      - cn-beijing-i
      - cn-beijing-j
      - cn-beijing-k
      - cn-beijing-l
      - cn-shanghai-b
      - cn-shanghai-d
      - cn-shanghai-e
      - cn-shanghai-f
      - cn-shanghai-g
      - cn-shanghai-l
      - cn-shanghai-m
      - cn-shanghai-n
      - cn-qingdao-b
      - cn-qingdao-c
      - cn-hongkong-b
      - cn-hongkong-c
      - cn-hongkong-d
      - ap-southeast-1a
      - ap-southeast-1b
      - ap-southeast-1c
      - ap-southeast-1d
      - us-east-1a
      - us-east-1b
      - eu-central-1a
      - eu-central-1b
      - eu-central-1c
    AssociationPropertyMetadata:
      ExclusiveTo:
        - ZoneId2
    Label:
      en: Zone ID 1
      zh-cn: 可用区1
  ZoneId2:
    Type: String
    AssociationProperty: ALIYUN::ECS::Instance:ZoneId
    Default: Null
    Required: true
    AllowedValues:
      - cn-hangzhou-b
      - cn-hangzhou-g
      - cn-hangzhou-h
      - cn-hangzhou-i
      - cn-hangzhou-j
      - cn-hangzhou-k
      - cn-beijing-f
      - cn-beijing-g
      - cn-beijing-h
      - cn-beijing-i
      - cn-beijing-j
      - cn-beijing-k
      - cn-beijing-l
      - cn-shanghai-b
      - cn-shanghai-d
      - cn-shanghai-e
      - cn-shanghai-f
      - cn-shanghai-g
      - cn-shanghai-l
      - cn-shanghai-m
      - cn-shanghai-n
      - cn-qingdao-b
      - cn-qingdao-c
      - cn-hongkong-b
      - cn-hongkong-c
      - cn-hongkong-d
      - ap-southeast-1a
      - ap-southeast-1b
      - ap-southeast-1c
      - ap-southeast-1d
      - us-east-1a
      - us-east-1b
      - eu-central-1a
      - eu-central-1b
      - eu-central-1c
    AssociationPropertyMetadata:
      ExclusiveTo:
        - ZoneId1
    Label:
      en: Zone ID 2
      zh-cn: 可用区2
  # ==================== VPC 配置 ====================
  VpcOption:
    Type: String
    AllowedValues:
      - NewVPC
      - ExistingVPC
    AssociationPropertyMetadata:
      ValueLabelMapping:
        NewVPC:
          zh-cn: 新建专有网络
          en: New VPC
        ExistingVPC:
          zh-cn: 已有专有网络
          en: Existing VPC
    Label:
      en: Select Existing or New VPC
      zh-cn: 选择已有/新建的专有网络
    Required: true
    Default: NewVPC
  SnatEntry:
    Type: Boolean
    Default: true
    AllowedValues:
      - true
      - false
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - ${VpcOption}
            - ExistingVPC
    Label:
      zh-cn: k8s集群是否打开snat
      en: k8s集群set snat
    Description:
      zh-cn: VPC如果具备公网访问能力请设置为false
      en: If the VPC has public network access, set it to false
  EnableOpenClawNat:
    Type: Boolean
    Default: true
    AllowedValues:
      - true
      - false
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - ${VpcOption}
            - ExistingVPC
    Label:
      zh-cn: 是否创建 OpenClaw 独立 NAT 网关
      en: Create OpenClaw dedicated NAT Gateway
    Description:
      zh-cn: 为 OpenClaw Sandbox Pod 创建独立 NAT 网关实现出公网流量隔离。如果同一 VPC 下已有其他 OpenClaw 集群创建了独立 NAT，请设置为 false 避免冲突
      en: Create a dedicated NAT Gateway for OpenClaw Sandbox Pods. Set to false if another OpenClaw cluster in the same VPC already has one
  VpcId:
    Type: String
    Label:
      en: VPC ID
      zh-cn: 专有网络VPC实例ID
    Description:
      en: Please search the ID starting with (vpc-xxx) from console-Virtual Private Cloud
      zh-cn: 现有虚拟专有网络的实例ID
    Required: true
    Default: Null
    AssociationProperty: 'ALIYUN::ECS::VPC::VPCId'
    AssociationPropertyMetadata:
      RegionId: '${RegionId}'
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  VpcCidrBlock:
    Type: String
    Label:
      en: VPC CIDR IPv4 Block
      zh-cn: 专有网络IPv4网段
    Description:
      zh-cn: VPC的ip地址段范围，<br>您可以使用以下的ip地址段或其子网:<br><font color='green'>[10.0.0.0/8]</font><br><font color='green'>[172.16.0.0/12]</font><br><font color='green'>[192.168.0.0/16]</font>
      en: 'The ip address range of the VPC in the CidrBlock form; <br>You can use the following ip address ranges and their subnets: <br><font color=''green''>[10.0.0.0/8]</font><br><font color=''green''>[172.16.0.0/12]</font><br><font color=''green''>[192.168.0.0/16]</font>'
    Default: 192.168.0.0/16
    Required: true
    AssociationProperty: ALIYUN::VPC::VPC::CidrBlock
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  # ==================== 业务 VSW（2 个，已有 VPC 场景） ====================
  VSwitchId1:
    Type: String
    Label:
      en: Business VSwitch ID 1
      zh-cn: 业务交换机实例ID 1
    Description:
      zh-cn: 业务网络交换机（可用区1），用于集群节点和普通业务 Pod。不能与 OpenClaw 专用交换机及其他业务交换机相同
      en: Business VSwitch in Zone 1, for cluster nodes and general business Pods. Must differ from OpenClaw VSwitches and other business VSwitches
    Required: true
    Default: Null
    AssociationProperty: 'ALIYUN::ECS::VSwitch::VSwitchId'
    AssociationPropertyMetadata:
      VpcId: '${VpcId}'
      ZoneId: '${ZoneId1}'
      ExclusiveTo:
        - VSwitchId2
        - OpenClawVSwitchId1
        - OpenClawVSwitchId2
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  VSwitchId2:
    Type: String
    Label:
      en: Business VSwitch ID 2
      zh-cn: 业务交换机实例ID 2
    Description:
      zh-cn: 业务网络交换机（可用区2），用于集群节点和普通业务 Pod。不能与 OpenClaw 专用交换机及其他业务交换机相同
      en: Business VSwitch in Zone 2, for cluster nodes and general business Pods. Must differ from OpenClaw VSwitches and other business VSwitches
    Required: true
    Default: Null
    AssociationProperty: 'ALIYUN::ECS::VSwitch::VSwitchId'
    AssociationPropertyMetadata:
      VpcId: '${VpcId}'
      ZoneId: '${ZoneId2}'
      ExclusiveTo:
        - VSwitchId1
        - OpenClawVSwitchId1
        - OpenClawVSwitchId2
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  # ==================== 业务 VSW 网段（新建 VPC 场景） ====================
  VSwitchCidrBlock1:
    Type: String
    Label:
      en: Business VSwitch CIDR Block 1
      zh-cn: 业务交换机子网网段 1
    Description:
      zh-cn: 业务交换机网段（可用区1），必须属于VPC的子网段
      en: Business VSwitch CIDR in Zone 1, must belong to the subnet segment of VPC
    Default: 192.168.0.0/24
    Required: true
    AssociationProperty: ALIYUN::VPC::VSwitch::CidrBlock
    AssociationPropertyMetadata:
      VpcCidrBlock: VpcCidrBlock
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  VSwitchCidrBlock2:
    Type: String
    Label:
      en: Business VSwitch CIDR Block 2
      zh-cn: 业务交换机子网网段 2
    Description:
      zh-cn: 业务交换机网段（可用区2），必须属于VPC的子网段
      en: Business VSwitch CIDR in Zone 2, must belong to the subnet segment of VPC
    Default: 192.168.1.0/24
    Required: true
    AssociationProperty: ALIYUN::VPC::VSwitch::CidrBlock
    AssociationPropertyMetadata:
      VpcCidrBlock: VpcCidrBlock
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  # ==================== OpenClaw 独立 VSW（2 个，已有 VPC 场景） ====================
  OpenClawVSwitchId1:
    Type: String
    Label:
      en: OpenClaw VSwitch ID 1
      zh-cn: OpenClaw 专用交换机ID 1
    Description:
      zh-cn: OpenClaw 隔离网段交换机（可用区1），独立安全组，用于 Sandbox Pod 网络隔离。不能与业务交换机及其他 OpenClaw 交换机相同
      en: OpenClaw isolated VSwitch in Zone 1, with dedicated SecurityGroup for Sandbox Pod isolation. Must differ from business and other OpenClaw VSwitches
    Required: true
    Default: Null
    AssociationProperty: 'ALIYUN::ECS::VSwitch::VSwitchId'
    AssociationPropertyMetadata:
      VpcId: '${VpcId}'
      ZoneId: '${ZoneId1}'
      ExclusiveTo:
        - OpenClawVSwitchId2
        - VSwitchId1
        - VSwitchId2
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  OpenClawVSwitchId2:
    Type: String
    Label:
      en: OpenClaw VSwitch ID 2
      zh-cn: OpenClaw 专用交换机ID 2
    Description:
      zh-cn: OpenClaw 隔离网段交换机（可用区2），独立安全组，用于 Sandbox Pod 网络隔离。不能与业务交换机及其他 OpenClaw 交换机相同
      en: OpenClaw isolated VSwitch in Zone 2, with dedicated SecurityGroup for Sandbox Pod isolation. Must differ from business and other OpenClaw VSwitches
    Required: true
    Default: Null
    AssociationProperty: 'ALIYUN::ECS::VSwitch::VSwitchId'
    AssociationPropertyMetadata:
      VpcId: '${VpcId}'
      ZoneId: '${ZoneId2}'
      ExclusiveTo:
        - OpenClawVSwitchId1
        - VSwitchId1
        - VSwitchId2
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  # ==================== OpenClaw 独立 VSW 网段（新建 VPC 场景） ====================
  # ==================== 安全组精细化网段参数（动态获取） ====================
  # DownstreamCidrBlock: 使用业务 VSwitch 网段（VSwitchCidrBlock1/2），集群创建时自动确定
  # UpstreamCidrBlock: NAT 网关内网 IP，通过 DATASOURCE::VPC::NatGateways 动态获取
  # ApiserverCidrBlock: API Server 内网 IP，通过 DATASOURCE::CS::KubernetesCluster 的 MasterUrl 动态获取
  OpenClawVSwitchCidrBlock1:
    Type: String
    Label:
      en: OpenClaw VSwitch CIDR Block 1
      zh-cn: OpenClaw 专用交换机网段 1
    Description:
      zh-cn: OpenClaw 隔离网段（可用区1），与业务网段同属 192.168.0.0/16 主网段，使用 192.168.128.x 子网段实现隔离
      en: OpenClaw isolated CIDR in Zone 1, same 192.168.0.0/16 main CIDR as business network, using 192.168.128.x subnet for isolation
    Default: 192.168.128.0/24
    Required: true
    AssociationProperty: ALIYUN::VPC::VSwitch::CidrBlock
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  OpenClawVSwitchCidrBlock2:
    Type: String
    Label:
      en: OpenClaw VSwitch CIDR Block 2
      zh-cn: OpenClaw 专用交换机网段 2
    Description:
      zh-cn: OpenClaw 隔离网段（可用区2），与业务网段同属 192.168.0.0/16 主网段，使用 192.168.129.x 子网段实现隔离
      en: OpenClaw isolated CIDR in Zone 2, same 192.168.0.0/16 main CIDR as business network, using 192.168.129.x subnet for isolation
    Default: 192.168.129.0/24
    Required: true
    AssociationProperty: ALIYUN::VPC::VSwitch::CidrBlock
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  # ==================== ALB 专用 VSW（可选） ====================
  EnableCustomAlbVSwitch:
    Type: Boolean
    Label:
      en: Use dedicated VSwitch for ALB
      zh-cn: 为 ALB 指定独立交换机
    Description:
      zh-cn: 开启后可为 ALB 单独指定交换机，与集群节点交换机隔离。仅在已有VPC场景下生效。
      en: When enabled, you can specify dedicated VSwitches for ALB, isolated from cluster node VSwitches. Only effective in ExistingVPC scenario.
    Default: false
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  AlbVSwitchId1:
    Type: String
    Label:
      en: ALB VSwitch ID (Zone 1)
      zh-cn: ALB 交换机ID（可用区1）
    Description:
      en: Dedicated VSwitch for ALB in Zone 1.
      zh-cn: ALB 在可用区1使用的专用交换机，须属于同一VPC。
    Required: false
    Default: Null
    AssociationProperty: 'ALIYUN::ECS::VSwitch::VSwitchId'
    AssociationPropertyMetadata:
      VpcId: '${VpcId}'
      ZoneId: '${ZoneId1}'
      Visible:
        Condition:
          Fn::And:
            - Fn::Equals:
                - ExistingVPC
                - ${VpcOption}
            - Fn::Equals:
                - true
                - ${EnableCustomAlbVSwitch}
  AlbVSwitchId2:
    Type: String
    Label:
      en: ALB VSwitch ID (Zone 2)
      zh-cn: ALB 交换机ID（可用区2）
    Description:
      en: Dedicated VSwitch for ALB in Zone 2.
      zh-cn: ALB 在可用区2使用的专用交换机，须属于同一VPC。
    Required: false
    Default: Null
    AssociationProperty: 'ALIYUN::ECS::VSwitch::VSwitchId'
    AssociationPropertyMetadata:
      VpcId: '${VpcId}'
      ZoneId: '${ZoneId2}'
      Visible:
        Condition:
          Fn::And:
            - Fn::Equals:
                - ExistingVPC
                - ${VpcOption}
            - Fn::Equals:
                - true
                - ${EnableCustomAlbVSwitch}
  ServiceCidr:
    Type: String
    Description:
      zh-cn: 可选范围：10.0.0.0/16-24，172.16-31.0.0/16-24，192.168.0.0/16-24<br>不能与 VPC 及 VPC 内已有 Kubernetes 集群使用的网段重复。<font color='blue'><b>创建成功后不能修改</b></font>
      en: 'Optional range: 10.0.0.0/16-24, 172.16-31.0.0/16-24, 192.168.0.0/16-24<br>Cannot duplicate segments already used by existing Kubernetes clusters in VPC.<font color=''blue''><b>Cannot be modified after successful creation</b></font>'
    Label:
      zh-cn: Service CIDR
      en: Service CIDR
    AssociationProperty: ALIYUN::CS::ManagedKubernetesCluster::ServiceCidr
    AssociationPropertyMetadata:
      ContainerCidr: 172.20.0.0/20
      VpcId: '${VpcId}'
      RegionId: ${RegionId}
      ClusterType: ManagedKubernetes
      NodeCidrMask: 26
      Addons:
        - name: terway
    Default: 172.16.0.0/16
  InstanceType:
    Type: CommaDelimitedList
    Default:
      - ecs.g7.2xlarge
    AssociationProperty: ALIYUN::ECS::Instance::InstanceType
    AssociationPropertyMetadata:
      CreateACKClusterParams:
        NetworkPlugin: terway-eniip
      Constraints:
        InstanceTypeFamily:
          - ecs.c7
          - ecs.g7
          - ecs.r7
          - ecs.c7a
          - ecs.g7a
          - ecs.r7a
          - ecs.hfg9i
          - ecs.r9i
          - ecs.c9a
          - ecs.c9ae
    Label:
      en: Worker Instance Type
      zh-cn: Worker 节点实例规格
  WorkerSystemDiskSize:
    Default: 120
    Label: Worker节点系统盘大小(GB)
    Type: Number
    MinValue: 1
  WorkerSystemDiskCategory:
    Type: String
    AssociationPropertyMetadata:
      LocaleKey: DiskCategory
      InstanceType: ${InstanceType}
    Default: cloud_essd
    AllowedValues:
      - cloud_efficiency
      - cloud_ssd
      - cloud_essd
  WorkerInstanceCount:
    Default: 3
    Type: Number
    Label:
      zh-cn: 实例节点数
      en: The count for cpu instance.
    MinValue: 3
    MaxValue: 5000
  E2BDomainAddress:
    Type: String
    Label:
      en: Sandbox Domain
      zh-cn: Sandbox 访问域名
    Description:
      en: Please enter a valid domain name
      zh-cn: 请输入有效的域名
    AllowedPattern: ^(?!-)[A-Za-z0-9-]{1,63}(?<!-)(\.[A-Za-z0-9-]{1,63}(?<!-))+$
    Default: agent-vpc.infra
  EnablePrivateZone:
    Type: Boolean
    Label:
      zh-cn: 是否配置内网域名解析
      en: Enable internal network domain name resolution
    Description:
      zh-cn: 若需要内网访问，需要通过PrivateZone配置内网域名解析。打开此配置会自动创建PrivateZone，并设置内网权威域名的生效范围为所选的VPC。
      en: If internal network access is required, configure internal domain name resolution through PrivateZone.
    Default: true
  TLSCert:
    Type: String
    Label:
      en: TLS Cert.
      zh-cn: TLS 证书
    Description:
      zh-cn: 证书对应的fullchain.pem文件
      en: The fullchain.pem file of the certificate
    NoEcho: true
    AssociationProperty: FileContent
    AssociationPropertyMetadata:
      AcceptFileSuffixes: .pem
  TLSSecret:
    Type: String
    Label:
      en: TLS Secret.
      zh-cn: TLS 证书密钥
    Description:
      zh-cn: 证书对应的privkey.pem文件
      en: The privkey.pem file of the certificate
    NoEcho: true
    AssociationProperty: FileContent
    AssociationPropertyMetadata:
      AcceptFileSuffixes: .pem
  AdminApiKey:
    Type: String
    Label:
      zh-cn: Sandbox API 访问密钥
      en: API Key for Sandbox Access
    AssociationProperty: AutoCompleteInput
    AssociationPropertyMetadata:
      Length: 32
      Prefix: e2b_
      CharacterClasses:
        - Class: lowercase
          min: 10
        - Class: number
          min: 10
    Default: Null
  SandboxManagerCpu:
    Type: Number
    Label:
      en: CPU resources for sandbox-manager
      zh-cn: Sandbox Manager CPU 资源
    Description:
      zh-cn: 为 sandbox-manager 分配的 CPU 核数
      en: CPU cores allocated for sandbox-manager
    Default: 2
    MinValue: 2
    MaxValue: 32
  SandboxManagerMemory:
    Type: String
    Label:
      en: Memory resources for sandbox-manager
      zh-cn: Sandbox Manager 内存资源
    Description:
      zh-cn: 为 sandbox-manager 分配的内存大小
      en: Memory allocated for sandbox-manager
    Default: 4Gi
  SandboxManagerScheduleToVirtualNode:
    Type: String
    Label:
      en: Schedule to Virtual Node
      zh-cn: Sandbox manager 调度到虚拟节点
    Description:
      zh-cn: 是否将 Sandbox Manager 调度到虚拟节点（ACS 模式），启用后 Sandbox Manager 将运行在 Serverless 虚拟节点上
      en: Whether to schedule Sandbox Manager to virtual nodes (ACS mode). When enabled, Sandbox Manager will run on Serverless virtual nodes
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
  SandboxNamespace:
    Type: String
    Label:
      en: Sandbox Namespace
      zh-cn: Sandbox 命名空间
    Description:
      zh-cn: SandboxSet（OpenClaw Pod）和 TestPod 所在的 Kubernetes 命名空间。sandbox-manager 固定部署在 sandbox-system，不受此参数影响
      en: Kubernetes namespace for SandboxSet (OpenClaw Pods) and TestPod. sandbox-manager is always deployed in sandbox-system
    Default: default
    AllowedPattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
    ConstraintDescription:
      zh-cn: 仅允许小写字母、数字和连字符，必须以字母或数字开头和结尾
      en: Only lowercase letters, digits and hyphens allowed, must start and end with a letter or digit
  OpenClawReplicas:
    Type: Number
    Label:
      en: OpenClaw Replicas
      zh-cn: OpenClaw 预热副本数
    Description:
      zh-cn: SandboxSet预热池中的沙箱副本数量
      en: Number of sandbox replicas in the SandboxSet warm pool
    Default: 1
    MinValue: 1
    MaxValue: 10
  OpenClawImage:
    Type: String
    Label:
      en: OpenClaw Image
      zh-cn: OpenClaw 镜像地址
    Description:
      zh-cn: OpenClaw 容器镜像地址，根据部署地域自动选择最优镜像源
      en: OpenClaw container image address, automatically selects optimal registry based on region
    AssociationProperty: TextArea
    AssociationPropertyMetadata:
      DynamicValue:
        - Condition:
            Fn::Contains:
              - - cn-beijing
                - cn-shanghai
                - cn-guangzhou
                - cn-hangzhou
                - ap-southeast-1
                - cn-hongkong
                - ap-northeast-1
                - us-east-1
              - ${RegionId}
          Value: registry-${RegionId}.ack.aliyuncs.com/ack-demo/openclaw:2026.3.23-2
        - Condition:
            Fn::Not:
              Fn::Contains:
                - - cn-beijing
                  - cn-shanghai
                  - cn-guangzhou
                  - cn-hangzhou
                  - ap-southeast-1
                  - cn-hongkong
                  - ap-northeast-1
                  - us-east-1
                - ${RegionId}
          Value: registry-cn-hangzhou.ack.aliyuncs.com/ack-demo/openclaw:2026.3.23-2
  EnablePublicIp:
    Type: Boolean
    Description:
      en: Access sandbox-manager via the public network. (Alb enable the public ip)
      zh-cn: 通过公网访问sandbox-manager.(Alb 开启公网访问)
    Label:
      en: Whether to enable the public ip.
      zh-cn: 是否支持公网访问
    Default: false
  # ==================== CMS 可观测性配置 ====================
  EnableCmsObservability:
    Type: Boolean
    Label:
      en: Enable CMS Observability
      zh-cn: 启用云监控可观测性
    Description:
      zh-cn: 启用后将通过无侵入方式接入阿里云云监控2.0（ARMS），自动采集 OpenClaw 的 Trace、Metrics 等可观测数据。需要提前在云监控2.0控制台创建工作空间。
      en: When enabled, OpenClaw will be instrumented with Alibaba Cloud CMS 2.0 (ARMS) for automatic trace and metrics collection. Requires a pre-created CMS 2.0 workspace.
    Default: false
  CmsWorkspaceName:
    Type: String
    Required: true
    Label:
      en: CMS Workspace Name
      zh-cn: 云监控工作空间名称
    Description:
      zh-cn: 云监控2.0工作空间名称。如启用云监控可观测性，必须填写。可在云监控2.0控制台创建工作空间，
      en: CMS 2.0 workspace name. If empty, defaults to default-cms-${AccountUID}-${RegionId}.
    Default: ''
    AssociationProperty: ALIYUN::CMS::Workspace
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - true
            - ${EnableCmsObservability}
  CmsServiceName:
    Type: String
    Required: false
    Label:
      en: CMS Service Name
      zh-cn: 云监控应用服务名称
    Description:
      zh-cn: 云监控2.0中的应用服务名称，用于标识 OpenClaw 的 Trace 数据来源。
      en: Application service name in CMS 2.0, used to identify the source of OpenClaw trace data.
    Default: openclaw
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - true
            - ${EnableCmsObservability}
Resources:
  # ========== CMS 可观测性：通过 DATASOURCE 自动查询 ServiceObservability 信息 ==========
  CmsServiceObservability:
    Type: DATASOURCE::CMS2::ServiceObservability
    Condition: EnableCmsObservabilityCondition
    Properties:
      RefreshOptions: Always
      Type: apm
      Workspace:
        Ref: CmsWorkspaceName
  # ==================== VPC & 业务 VSW（2 可用区） ====================
  Vpc:
    Type: ALIYUN::ECS::VPC
    Condition: CreateNewVpcCondition
    Properties:
      CidrBlock:
        Ref: VpcCidrBlock
      VpcName:
        Fn::Sub: openclaw-prod-vpc-${ALIYUN::StackName}
  VpcSecondaryCidr1:
    Type: ALIYUN::VPC::VpcCidrBlockAssociation
    Condition: NeedSecondaryCidrCondition
    Properties:
      VpcId:
        Fn::GetAtt:
          - Vpc
          - VpcId
      SecondaryCidrBlock:
        Ref: OpenClawVSwitchCidrBlock1
  VpcSecondaryCidr2:
    Type: ALIYUN::VPC::VpcCidrBlockAssociation
    Condition: NeedSecondaryCidrCondition
    Properties:
      VpcId:
        Fn::GetAtt:
          - Vpc
          - VpcId
      SecondaryCidrBlock:
        Ref: OpenClawVSwitchCidrBlock2
  BusinessVSwitch1:
    Type: ALIYUN::ECS::VSwitch
    Condition: CreateNewVpcCondition
    Properties:
      ZoneId:
        Ref: ZoneId1
      VpcId:
        Fn::GetAtt:
          - Vpc
          - VpcId
      CidrBlock:
        Ref: VSwitchCidrBlock1
      VSwitchName:
        Fn::Sub: biz-vsw1-${ALIYUN::StackName}
  BusinessVSwitch2:
    Type: ALIYUN::ECS::VSwitch
    Condition: CreateNewVpcCondition
    Properties:
      ZoneId:
        Ref: ZoneId2
      VpcId:
        Fn::GetAtt:
          - Vpc
          - VpcId
      CidrBlock:
        Ref: VSwitchCidrBlock2
      VSwitchName:
        Fn::Sub: biz-vsw2-${ALIYUN::StackName}
  OpenClawVSwitch1:
    Type: ALIYUN::ECS::VSwitch
    Condition: CreateNewVpcCondition
    DependsOn: VpcSecondaryCidr1
    Properties:
      ZoneId:
        Ref: ZoneId1
      VpcId:
        Fn::GetAtt:
          - Vpc
          - VpcId
      CidrBlock:
        Ref: OpenClawVSwitchCidrBlock1
      VSwitchName:
        Fn::Sub: openclaw-vsw1-${ALIYUN::StackName}
  OpenClawVSwitch2:
    Type: ALIYUN::ECS::VSwitch
    Condition: CreateNewVpcCondition
    DependsOn: VpcSecondaryCidr2
    Properties:
      ZoneId:
        Ref: ZoneId2
      VpcId:
        Fn::GetAtt:
          - Vpc
          - VpcId
      CidrBlock:
        Ref: OpenClawVSwitchCidrBlock2
      VSwitchName:
        Fn::Sub: openclaw-vsw2-${ALIYUN::StackName}
  # ==================== ACK 集群安全组（normal 类型） ====================
  # normal 安全组作为 ACK 集群安全组，让 ACK 自动管理基础规则
  # ==================== ACK 集群安全组 ====================
  # 不自己创建控制面安全组，让 ACK 自动创建
  # 集群创建后通过 ClusterDataSource (DATASOURCE::CS::KubernetesCluster) 查出 SecurityGroupId
  # VirtualNode 和 Outputs 引用 ClusterDataSource.SecurityGroupId
  # ==================== OpenClaw Pod 隔离安全组（enterprise 类型） ====================
  # enterprise 安全组仅用于 OpenClaw Pod（通过 annotation 关联）
  # InnerAccessPolicy=Drop，同安全组内实例之间默认不互通，实现 Pod 间网络隔离
  # 参考：https://help.aliyun.com/zh/ack/ack-managed-and-ack-dedicated/user-guide/configure-security-group-rules-to-enforce-access-control-on-ack-clusters
  OpenClawIsolationSecurityGroup:
    Type: ALIYUN::ECS::SecurityGroup
    Properties:
      VpcId:
        Fn::If:
          - CreateNewVpcCondition
          - Fn::GetAtt:
              - Vpc
              - VpcId
          - Ref: VpcId
      SecurityGroupName:
        Fn::Sub: openclaw-isolation-sg-${ALIYUN::StackName}
      Description: OpenClaw Pod 隔离安全组（enterprise类型），通过 annotation 关联到 OpenClaw Pod
      SecurityGroupType: enterprise
      SecurityGroupIngress:
        # ---- 入方向规则 ----
        # 允许业务/管控交换机网段全端口访问（API Server、kubelet 健康检查、sandbox-manager 等）
        # 参考文档：仅放行集群其他服务/管控使用的交换机网段，不放行 OpenClaw 网段
        - IpProtocol: tcp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VSwitchCidrBlock1
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - BusinessVSwitch1DataSource
                      - VSwitches
          Priority: 1
          Description: 允许业务VSwitch1网段TCP全端口访问
        - IpProtocol: tcp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VSwitchCidrBlock2
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - BusinessVSwitch2DataSource
                      - VSwitches
          Priority: 1
          Description: 允许业务VSwitch2网段TCP全端口访问
        - IpProtocol: udp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VSwitchCidrBlock1
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - BusinessVSwitch1DataSource
                      - VSwitches
          Priority: 1
          Description: 允许业务VSwitch1网段UDP全端口访问
        - IpProtocol: udp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VSwitchCidrBlock2
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - BusinessVSwitch2DataSource
                      - VSwitches
          Priority: 1
          Description: 允许业务VSwitch2网段UDP全端口访问
        # 允许 OpenClaw 2 个 VSwitch 网段（kubelet 健康检查等）
        - IpProtocol: tcp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock1
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch1DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch1 TCP(kubelet健康检查)
        - IpProtocol: udp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock1
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch1DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch1 UDP
        - IpProtocol: tcp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock2
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch2DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch2 TCP(kubelet健康检查)
        - IpProtocol: udp
          PortRange: 1/65535
          SourceCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock2
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch2DataSource
                      - VSwitches
          Priority: 1
          Description: 允许OpenClaw VSwitch2 UDP
        # 允许云产品网段（100.64.0.0/10，含 metadata/DNS/ACR/SLB 等）
        - IpProtocol: tcp
          PortRange: 1/65535
          SourceCidrIp: 100.64.0.0/10
          Priority: 1
          Description: 允许云产品网段TCP(metadata/DNS/ACR/SLB)
        - IpProtocol: udp
          PortRange: 1/65535
          SourceCidrIp: 100.64.0.0/10
          Priority: 1
          Description: 允许云产品网段UDP(metadata/DNS/ACR/SLB)
      SecurityGroupEgress:
        # ---- 出方向规则 ----
        # enterprise 安全组默认拒绝所有出方向，必须显式放行
        # 允许云产品网段（100.64.0.0/10，含 metadata/DNS/ACR/SLB 等）
        - IpProtocol: tcp
          PortRange: 1/65535
          DestCidrIp: 100.64.0.0/10
          Priority: 1
          Description: 允许云产品网段TCP(metadata/DNS/ACR/SLB)
        - IpProtocol: udp
          PortRange: 1/65535
          DestCidrIp: 100.64.0.0/10
          Priority: 1
          Description: 允许云产品网段UDP(metadata/DNS/ACR/SLB)
        # 允许访问 API Server 6443 + 443（业务交换机网段）
        - IpProtocol: tcp
          PortRange: 443/443
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VSwitchCidrBlock1
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - BusinessVSwitch1DataSource
                      - VSwitches
          Priority: 1
          Description: 允许访问API Server 443(业务VSwitch1)
        - IpProtocol: tcp
          PortRange: 443/443
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VSwitchCidrBlock2
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - BusinessVSwitch2DataSource
                      - VSwitches
          Priority: 1
          Description: 允许访问API Server 443(业务VSwitch2)
        - IpProtocol: tcp
          PortRange: 6443/6443
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VSwitchCidrBlock1
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - BusinessVSwitch1DataSource
                      - VSwitches
          Priority: 1
          Description: 允许访问API Server 6443(业务VSwitch1)
        - IpProtocol: tcp
          PortRange: 6443/6443
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VSwitchCidrBlock2
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - BusinessVSwitch2DataSource
                      - VSwitches
          Priority: 1
          Description: 允许访问API Server 6443(业务VSwitch2)
        # 允许访问 API Server via ServiceCIDR（init container 通过 kubernetes.default.svc ClusterIP 访问）
        - IpProtocol: tcp
          PortRange: 443/443
          DestCidrIp:
            Ref: ServiceCidr
          Priority: 1
          Description: 允许访问API Server 443(ServiceCIDR)
        - IpProtocol: tcp
          PortRange: 6443/6443
          DestCidrIp:
            Ref: ServiceCidr
          Priority: 1
          Description: 允许访问API Server 6443(ServiceCIDR)
        # 允许访问 Poseidon 9082（业务交换机网段）
        - IpProtocol: tcp
          PortRange: 9082/9082
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VSwitchCidrBlock1
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - BusinessVSwitch1DataSource
                      - VSwitches
          Priority: 1
          Description: 允许访问Poseidon 9082(业务VSwitch1)
        - IpProtocol: tcp
          PortRange: 9082/9082
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VSwitchCidrBlock2
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - BusinessVSwitch2DataSource
                      - VSwitches
          Priority: 1
          Description: 允许访问Poseidon 9082(业务VSwitch2)
        # 允许业务交换机网段 DNS（VPC 内 DNS 解析）
        - IpProtocol: tcp
          PortRange: 53/53
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VSwitchCidrBlock1
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - BusinessVSwitch1DataSource
                      - VSwitches
          Priority: 1
          Description: 允许业务VSwitch1 DNS TCP
        - IpProtocol: tcp
          PortRange: 53/53
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VSwitchCidrBlock2
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - BusinessVSwitch2DataSource
                      - VSwitches
          Priority: 1
          Description: 允许业务VSwitch2 DNS TCP
        - IpProtocol: udp
          PortRange: 53/53
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VSwitchCidrBlock1
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - BusinessVSwitch1DataSource
                      - VSwitches
          Priority: 1
          Description: 允许业务VSwitch1 DNS UDP
        - IpProtocol: udp
          PortRange: 53/53
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: VSwitchCidrBlock2
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - BusinessVSwitch2DataSource
                      - VSwitches
          Priority: 1
          Description: 允许业务VSwitch2 DNS UDP
        # ---- 拒绝 OpenClaw VSwitch 网段（防止 Pod 间横向移动） ----
        - IpProtocol: all
          PortRange: -1/-1
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock1
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch1DataSource
                      - VSwitches
          Priority: 1
          Description: 拒绝访问OpenClaw VSwitch1网段
          Policy: drop
        - IpProtocol: all
          PortRange: -1/-1
          DestCidrIp:
            Fn::If:
              - CreateNewVpcCondition
              - Ref: OpenClawVSwitchCidrBlock2
              - Fn::Jq:
                  - First
                  - .[0].CidrBlock
                  - Fn::GetAtt:
                      - OpenClawVSwitch2DataSource
                      - VSwitches
          Priority: 1
          Description: 拒绝访问OpenClaw VSwitch2网段
          Policy: drop
        # ---- 拒绝所有内网网段（兜底安全策略） ----
        - IpProtocol: all
          PortRange: -1/-1
          DestCidrIp: 192.168.0.0/16
          Priority: 50
          Description: 拒绝访问内网192.168.0.0/16
          Policy: drop
        - IpProtocol: all
          PortRange: -1/-1
          DestCidrIp: 172.16.0.0/12
          Priority: 50
          Description: 拒绝访问内网172.16.0.0/12
          Policy: drop
        - IpProtocol: all
          PortRange: -1/-1
          DestCidrIp: 10.0.0.0/8
          Priority: 50
          Description: 拒绝访问内网10.0.0.0/8
          Policy: drop
        # ---- 允许公网出方向（通过 NAT 网关出去，优先级最低） ----
        - IpProtocol: tcp
          PortRange: 1/65535
          DestCidrIp: 0.0.0.0/0
          Priority: 100
          Description: 允许公网TCP
        - IpProtocol: udp
          PortRange: 1/65535
          DestCidrIp: 0.0.0.0/0
          Priority: 100
          Description: 允许公网UDP
  Sleep:
    Type: ALIYUN::ROS::Sleep
    DependsOn:
      - AckCluster
    Properties:
      CreateDuration: 10
  # ==================== ACK 集群 + VirtualNode ====================
  AckCluster:
    Type: ALIYUN::CS::ManagedKubernetesCluster
    Properties:
      Name:
        Fn::Sub: openclaw-ack-${ALIYUN::StackName}
      ClusterSpec: ack.pro.small
      KubernetesVersion: '1.35.2-aliyun.1'
      ChargeType: PostPaid
      IsEnterpriseSecurityGroup: true
      VpcId:
        Fn::If:
          - CreateNewVpcCondition
          - Fn::GetAtt:
              - Vpc
              - VpcId
          - Ref: VpcId
      VSwitchIds:
        - Fn::If:
            - CreateNewVpcCondition
            - Fn::GetAtt:
                - BusinessVSwitch1
                - VSwitchId
            - Ref: VSwitchId1
        - Fn::If:
            - CreateNewVpcCondition
            - Fn::GetAtt:
                - BusinessVSwitch2
                - VSwitchId
            - Ref: VSwitchId2
      PodVswitchIds:
        - Fn::If:
            - CreateNewVpcCondition
            - Fn::GetAtt:
                - BusinessVSwitch1
                - VSwitchId
            - Ref: VSwitchId1
        - Fn::If:
            - CreateNewVpcCondition
            - Fn::GetAtt:
                - BusinessVSwitch2
                - VSwitchId
            - Ref: VSwitchId2
      SnatEntry:
        Ref: SnatEntry
      ServiceCidr:
        Ref: ServiceCidr
      Addons:
        - Name: terway-eniip
        - Name: csi-plugin
        - Name: csi-provisioner
        - Name: loongcollector
          Config: '{"IngressDashboardEnabled":"true"}'
      NumOfNodes: 0
      NodePools:
        - NodePoolInfo:
            Name: default-nodepool
          ScalingGroup:
            InstanceTypes:
              Ref: InstanceType
            InstanceChargeType: PostPaid
            SystemDiskCategory:
              Ref: WorkerSystemDiskCategory
            SystemDiskSize:
              Ref: WorkerSystemDiskSize
            VSwitchIds:
              - Fn::If:
                  - CreateNewVpcCondition
                  - Fn::GetAtt:
                      - BusinessVSwitch1
                      - VSwitchId
                  - Ref: VSwitchId1
              - Fn::If:
                  - CreateNewVpcCondition
                  - Fn::GetAtt:
                      - BusinessVSwitch2
                      - VSwitchId
                  - Ref: VSwitchId2
            ZoneIds:
              - Ref: ZoneId1
              - Ref: ZoneId2
            DesiredSize:
              Ref: WorkerInstanceCount
          KubernetesConfig:
            Runtime: containerd
            RuntimeVersion: 1.6.28
      EndpointPublicAccess: true
      ProxyMode: ipvs
      DisableRollback: true
      TimeoutMins: 60
  # ========== Addon 组件安装（带依赖链） ==========
  # Step 1: ALB Ingress Controller（基础网络，使用业务 VSW 的前两个可用区）
  AlbIngressAddon:
    Type: ALIYUN::CS::ClusterAddons
    DependsOn: Sleep
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      InstalledIgnore: true
      Addons:
        - Name: alb-ingress-controller
          Config:
            Fn::Sub:
              - '{"albIngress":{"AddressType":"${AddressType}","ZoneMappings":{"${ZoneId1}":["${VswitchId1}"],"${ZoneId2}":["${VswitchId2}"]},"CreateDefaultALBConfig":true}}'
              - ZoneId1:
                  Ref: ZoneId1
                VswitchId1:
                  Fn::If:
                    - UseCustomAlbVSwitchCondition
                    - Ref: AlbVSwitchId1
                    - Fn::If:
                        - CreateNewVpcCondition
                        - Fn::GetAtt:
                            - BusinessVSwitch1
                            - VSwitchId
                        - Ref: VSwitchId1
                ZoneId2:
                  Ref: ZoneId2
                VswitchId2:
                  Fn::If:
                    - UseCustomAlbVSwitchCondition
                    - Ref: AlbVSwitchId2
                    - Fn::If:
                        - CreateNewVpcCondition
                        - Fn::GetAtt:
                            - BusinessVSwitch2
                            - VSwitchId
                        - Ref: VSwitchId2
                AddressType:
                  Fn::If:
                    - EnablePublicIpConditions
                    - Internet
                    - Intranet
  # Step 2: 等待 ALB Ingress 就绪
  AlbIngressSleep:
    Type: ALIYUN::ROS::Sleep
    DependsOn: AlbIngressAddon
    Properties:
      CreateDuration: 180
  # ========== 查询 ALB 实例 ==========
  AlbDataSource:
    Type: DATASOURCE::ALB::LoadBalancers
    DependsOn: AddonSleep
    Properties:
      AddressType:
        Fn::If:
          - EnablePublicIpConditions
          - Internet
          - Intranet
      VpcIds:
        - Fn::If:
            - CreateNewVpcCondition
            - Fn::GetAtt:
                - Vpc
                - VpcId
            - Ref: VpcId
      Tags:
        - Key: ack.aliyun.com
          Value:
            Fn::GetAtt:
              - AckCluster
              - ClusterId
  # Step 2.5: VirtualNode（ECI 虚拟节点，用于调度 Sandbox Pod 到 ECI）
  VirtualNodeAddon:
    Type: ALIYUN::CS::ClusterAddons
    DependsOn: AlbIngressSleep
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      InstalledIgnore: true
      Addons:
        - Name: ack-virtual-node
          Config:
            Fn::Sub:
              - '{"ECI":{"VSwitchIds":"${VSW1},${VSW2}","SecurityGroupId":"${SGID}"}}'
              - VSW1:
                  Fn::If:
                    - CreateNewVpcCondition
                    - Fn::GetAtt:
                        - BusinessVSwitch1
                        - VSwitchId
                    - Ref: VSwitchId1
                VSW2:
                  Fn::If:
                    - CreateNewVpcCondition
                    - Fn::GetAtt:
                        - BusinessVSwitch2
                        - VSwitchId
                    - Ref: VSwitchId2
                SGID:
                  Fn::GetAtt:
                    - ClusterDataSource
                    - SecurityGroupId
  VirtualNodeSleep:
    Type: ALIYUN::ROS::Sleep
    DependsOn: VirtualNodeAddon
    Properties:
      CreateDuration: 120
  # Step 3: arms-prometheus（提供 Prometheus Operator CRD，ack-sandbox-manager 依赖 ServiceMonitor）
  ArmsPrometheusAddon:
    Type: ALIYUN::CS::ClusterAddons
    DependsOn: AlbIngressSleep
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      InstalledIgnore: true
      Addons:
        - Name: arms-prometheus
  # 等待 Prometheus Operator CRD（ServiceMonitor 等）注册完成
  ArmsPrometheusSleep:
    Type: ALIYUN::ROS::Sleep
    DependsOn: ArmsPrometheusAddon
    Properties:
      CreateDuration: 60
  # Step 3.5: Poseidon 网络策略组件（提供 GlobalTrafficPolicy / TrafficPolicy CRD）
  PoseidonAddon:
    Type: ALIYUN::CS::ClusterAddons
    DeletionPolicy: Retain
    DependsOn: ArmsPrometheusSleep
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      InstalledIgnore: true
      Addons:
        - Name: poseidon
          Config: '{"TrafficPolicy":true,"NetworkPolicy":true,"ACKNetworkPolicy":true}'
      WaitUntil:
        - Kind: CustomResourceDefinition
          Name: globaltrafficpolicies.network.alibabacloud.com
          ApiVersion: apiextensions.k8s.io/v1
          JsonPath: $.status.conditions[?(@.type=="Established")].status
          Value: 'True'
          Operator: Equals
          FirstMatch: true
          Timeout: 600
          Stage: Create/Update
  PoseidonSleep:
    Type: ALIYUN::ROS::Sleep
    DeletionPolicy: Retain
    DependsOn: PoseidonAddon
    Properties:
      CreateDuration: 60
  # Step 4: Sandbox Controller
  SandboxControllerAddon:
    Type: ALIYUN::CS::ClusterAddons
    DependsOn: PoseidonSleep
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      Addons:
        - Name: ack-agent-sandbox-controller
          Config: '{"workers":{"sandboxWorkers":200,"sandboxsetWorkers":10,"sandboxclaimWorkers":200},"featureGate":""}'
          Version: 'v0.5.9'
  # Step 5: Sandbox Manager
  SandboxManagerAddon:
    Type: ALIYUN::CS::ClusterAddons
    DependsOn: SandboxControllerAddon
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      InstalledIgnore: true
      Addons:
        - Name: ack-sandbox-manager
          Version: 'v0.5.0'
          Config:
            Fn::Sub:
              - '{"sandboxManager":{"replicaCount":3,"acs":${SandboxManagerScheduleToVirtualNode},"e2b":{"domain":"${E2BDomainAddress}","enableAuth":true,"adminApiKey":"${AdminApiKey}","maxTimeout":2592000},"ingress":{"className":"alb"},"controller":{"resources":{"cpu":"${SandboxManagerCpu}","memory":"${SandboxManagerMemory}"},"logLevel":5,"enableSLS":true,"maxClaimWorkers":100,"maxCreateQPS":200,"createPodInsteadOfSandbox":false,"extProcMaxConcurrency":3000}}}'
              - E2BDomainAddress:
                  Ref: E2BDomainAddress
                AdminApiKey:
                  Ref: AdminApiKey
                SandboxManagerCpu:
                  Ref: SandboxManagerCpu
                SandboxManagerMemory:
                  Ref: SandboxManagerMemory
                SandboxManagerScheduleToVirtualNode:
                  Ref: SandboxManagerScheduleToVirtualNode
  # 等待所有 Addon 就绪（GlobalTrafficPolicy CRD 需要网络策略组件完全就绪）
  AddonSleep:
    Type: ALIYUN::ROS::Sleep
    DependsOn: SandboxManagerAddon
    Properties:
      CreateDuration: 180
  # 获取集群 Kubeconfig
  ClusterUserKubeconfig:
    Type: DATASOURCE::CS::ClusterUserKubeconfig
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
  # ==================== DataSource：动态获取集群信息 ====================
  # 查询集群详情，获取 MasterUrl（含 API Server 内网 IP）
  ClusterDataSource:
    Type: DATASOURCE::CS::KubernetesCluster
    DependsOn: Sleep
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
  # 查询 VPC 内的 NAT 网关列表，获取集群默认 NAT 网关的内网 IP
  DefaultNatGatewayDataSource:
    Type: DATASOURCE::VPC::NatGateways
    DependsOn: Sleep
    Properties:
      VpcId:
        Fn::If:
          - CreateNewVpcCondition
          - Fn::GetAtt:
              - Vpc
              - VpcId
          - Ref: VpcId
      Status: Available
      NatType: Enhanced
  # ==================== DataSource：查询业务 VSwitch CIDR（已有 VPC 场景） ====================
  # 用于安全组入方向规则，实现精确到 VSwitch 网段的最小权限控制
  BusinessVSwitch1DataSource:
    Type: DATASOURCE::VPC::VSwitches
    Condition: UseExistingVpcCondition
    Properties:
      VSwitchIds:
        - Ref: VSwitchId1
  BusinessVSwitch2DataSource:
    Type: DATASOURCE::VPC::VSwitches
    Condition: UseExistingVpcCondition
    Properties:
      VSwitchIds:
        - Ref: VSwitchId2
  # ==================== DataSource：查询 OpenClaw VSwitch CIDR（已有 VPC 场景） ====================
  OpenClawVSwitch1DataSource:
    Type: DATASOURCE::VPC::VSwitches
    Condition: UseExistingVpcCondition
    Properties:
      VSwitchIds:
        - Ref: OpenClawVSwitchId1
  OpenClawVSwitch2DataSource:
    Type: DATASOURCE::VPC::VSwitches
    Condition: UseExistingVpcCondition
    Properties:
      VSwitchIds:
        - Ref: OpenClawVSwitchId2
  # ==================== OpenClaw 自定义路由表 ====================
  # OpenClaw VSwitch 使用独立路由表，默认路由指向 OpenClaw NAT 网关，实现出公网流量隔离
  OpenClawRouteTable:
    Condition: EnableOpenClawNatCondition
    Type: ALIYUN::VPC::RouteTable
    DependsOn: Sleep
    Properties:
      VpcId:
        Fn::If:
          - CreateNewVpcCondition
          - Fn::GetAtt:
              - Vpc
              - VpcId
          - Ref: VpcId
      RouteTableName:
        Fn::Sub: openclaw-rt-${ALIYUN::StackName}
      Description: OpenClaw VSwitch 独立路由表，出公网流量走 OpenClaw NAT 网关
  # ==================== OpenClaw 独立 NAT 网关 ====================
  # 为 OpenClaw VSwitch 创建独立 NAT 网关，实现出公网流量隔离
  # 必须在集群创建之后再创建，否则集群会复用 OpenClaw NAT 而不创建自己的默认 NAT
  OpenClawNatGateway:
    Condition: EnableOpenClawNatCondition
    Type: ALIYUN::VPC::NatGateway
    DependsOn: Sleep
    Properties:
      VpcId:
        Fn::If:
          - CreateNewVpcCondition
          - Fn::GetAtt:
              - Vpc
              - VpcId
          - Ref: VpcId
      VSwitchId:
        Fn::If:
          - CreateNewVpcCondition
          - Fn::GetAtt:
              - OpenClawVSwitch1
              - VSwitchId
          - Ref: OpenClawVSwitchId1
      NatGatewayName:
        Fn::Sub: openclaw-nat-${ALIYUN::StackName}
      NatType: Enhanced
      InternetChargeType: PayByLcu
      Description: OpenClaw Sandbox Pod 独立 NAT 网关，出公网流量隔离
  # OpenClaw NAT 网关绑定的 EIP
  OpenClawNatEip:
    Condition: EnableOpenClawNatCondition
    Type: ALIYUN::VPC::EIP
    Properties:
      Bandwidth: 200
      InternetChargeType: PayByTraffic
      InstanceChargeType: Postpaid
      Name:
        Fn::Sub: openclaw-nat-eip-${ALIYUN::StackName}
      Description: OpenClaw NAT 网关专用 EIP，Sandbox Pod 出公网流量均经此 IP
  # 等待 EIP 状态变为 Available（避免 IncorrectEipStatus 竞态条件）
  OpenClawNatEipReady:
    Condition: EnableOpenClawNatCondition
    Type: ALIYUN::ROS::Sleep
    DependsOn: OpenClawNatEip
    Properties:
      CreateDuration: 10
  # 将 EIP 绑定到 OpenClaw NAT 网关
  OpenClawNatEipAssociation:
    Condition: EnableOpenClawNatCondition
    Type: ALIYUN::VPC::EIPAssociation
    DependsOn:
      - OpenClawNatGateway
      - OpenClawNatEipReady
    Properties:
      AllocationId:
        Fn::GetAtt:
          - OpenClawNatEip
          - AllocationId
      InstanceId:
        Fn::GetAtt:
          - OpenClawNatGateway
          - NatGatewayId
  # ==================== OpenClaw 路由表关联与路由 ====================
  OpenClawRouteEntry:
    Condition: EnableOpenClawNatCondition
    Type: ALIYUN::ECS::Route
    DependsOn:
      - OpenClawNatEipAssociation
      - OpenClawRouteTable
    Properties:
      RouteTableId:
        Fn::GetAtt:
          - OpenClawRouteTable
          - RouteTableId
      DestinationCidrBlock: 0.0.0.0/0
      NextHopType: NatGateway
      NextHopId:
        Fn::GetAtt:
          - OpenClawNatGateway
          - NatGatewayId
  # 链式依赖 AssociationX，避免多个路由表关联并发操作同一 VSwitch 导致中间态报错
  OpenClawRouteTableAssociation1:
    Condition: EnableOpenClawNatCondition
    Type: ALIYUN::VPC::RouteTableAssociation
    DependsOn:
      - OpenClawRouteEntry
      - OpenClawSnatEntry2
    Properties:
      RouteTableId:
        Fn::GetAtt:
          - OpenClawRouteTable
          - RouteTableId
      VSwitchId:
        Fn::If:
          - CreateNewVpcCondition
          - Fn::GetAtt:
              - OpenClawVSwitch1
              - VSwitchId
          - Ref: OpenClawVSwitchId1
  # 链式依赖 AssociationX，避免多个路由表关联并发操作同一 VSwitch 导致中间态报错
  OpenClawRouteTableAssociation2:
    Condition: EnableOpenClawNatCondition
    Type: ALIYUN::VPC::RouteTableAssociation
    DependsOn:
      - OpenClawRouteEntry
      - OpenClawRouteTableAssociation1
      - OpenClawSnatEntry2
    Properties:
      RouteTableId:
        Fn::GetAtt:
          - OpenClawRouteTable
          - RouteTableId
      VSwitchId:
        Fn::If:
          - CreateNewVpcCondition
          - Fn::GetAtt:
              - OpenClawVSwitch2
              - VSwitchId
          - Ref: OpenClawVSwitchId2
  # SNAT 规则：OpenClaw VSwitchX 流量走独立 NAT
  # 链式依赖 SnatEntryX，避免多个 SNAT 规则并发操作同一 NAT 网关导致中间态报错
  OpenClawSnatEntry1:
    Condition: EnableOpenClawNatCondition
    Type: ALIYUN::VPC::SnatEntry
    DependsOn: OpenClawNatEipAssociation
    Properties:
      SnatTableId:
        Fn::GetAtt:
          - OpenClawNatGateway
          - SNatTableId
      SnatIp:
        Fn::GetAtt:
          - OpenClawNatEip
          - EipAddress
      SourceVSwitchIds:
        - Fn::If:
            - CreateNewVpcCondition
            - Fn::GetAtt:
                - OpenClawVSwitch1
                - VSwitchId
            - Ref: OpenClawVSwitchId1
      SnatEntryName: openclaw-snat-vsw1
  OpenClawSnatEntry2:
    Condition: EnableOpenClawNatCondition
    Type: ALIYUN::VPC::SnatEntry
    DependsOn:
      - OpenClawNatEipAssociation
      - OpenClawSnatEntry1
    Properties:
      SnatTableId:
        Fn::GetAtt:
          - OpenClawNatGateway
          - SNatTableId
      SnatIp:
        Fn::GetAtt:
          - OpenClawNatEip
          - EipAddress
      SourceVSwitchIds:
        - Fn::If:
            - CreateNewVpcCondition
            - Fn::GetAtt:
                - OpenClawVSwitch2
                - VSwitchId
            - Ref: OpenClawVSwitchId2
      SnatEntryName: openclaw-snat-vsw2
  # ==================== TLS Secret 配置 ====================
  ClusterAppliaction:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn: AddonSleep
    Properties:
      DefaultNamespace: sandbox-system
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: v1
            kind: Secret
            type: kubernetes.io/tls
            metadata:
              name: sandbox-manager-tls
              namespace: sandbox-system
            data:
              tls.crt: ${TLSCertString}
              tls.key: ${TLSSecretString}
          - TLSCertString:
              Fn::Base64Encode:
                Ref: TLSCert
            TLSSecretString:
              Fn::Base64Encode:
                Ref: TLSSecret
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
  # ==================== LoongCollector 日志采集配置 ====================
  # 额外等待 LoongCollector operator webhook 就绪（ECS 节点启动 + operator Pod Ready 需要时间）
  LoongCollectorSleep:
    Type: ALIYUN::ROS::Sleep
    DependsOn:
      - AddonSleep
      - AckCluster
    Properties:
      CreateDuration: 180
  LoongCollectorSeesionCR:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn: LoongCollectorSleep
    Properties:
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: telemetry.alibabacloud.com/v1alpha1
            kind: ClusterAliyunPipelineConfig
            metadata:
              name: openclaw-session-config
            spec:
              config:
                aggregators: []
                global:
                  TopicType: filepath
                  TopicFormat: .*/sessions/(?P<__session_id__>.*?).jsonl
                inputs:
                  - Type: input_file
                    FilePaths:
                      - /root/.openclaw/agents/*/sessions/*.jsonl
                    MaxDirSearchDepth: 0
                    FileEncoding: utf8
                    EnableContainerDiscovery: true
                    ContainerFilters:
                      K8sPodRegex: ^(openclaw.*)$
                processors:
                  - Type: processor_parse_json_native
                    SourceKey: content
                flushers:
                  - Type: flusher_sls
                    Logstore: openclaw-session
                sample: ''
              logstores:
                - encryptConf: {}
                  name: openclaw-session
                  productCode: openclaw_audit
              machineGroups:
                - name: k8s-group-${ClusterId}
              project:
                name: k8s-log-${ClusterId}
          - ClusterId:
              Fn::GetAtt:
                - AckCluster
                - ClusterId
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
  LoongCollectorRuntimeCR:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn: LoongCollectorSleep
    Properties:
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: telemetry.alibabacloud.com/v1alpha1
            kind: ClusterAliyunPipelineConfig
            metadata:
              name: openclaw-runtime-config
            spec:
              config:
                flushers:
                  - Logstore: openclaw-runtime
                    Type: flusher_sls
                global: {}
                inputs:
                  - ContainerFilters:
                      K8sPodRegex: ^(openclaw.*)$
                    EnableContainerDiscovery: true
                    FileEncoding: utf8
                    FilePaths:
                      - /tmp/openclaw/*.log
                    MaxDirSearchDepth: 0
                    Type: input_file
                processors:
                  - SourceKey: content
                    Type: processor_parse_json_native
              logstores:
                - encryptConf: {}
                  name: openclaw-runtime
                  productCode: openclaw_gateway
              machineGroups:
                - name: k8s-group-${ClusterId}
              project:
                name: k8s-log-${ClusterId}
          - ClusterId:
              Fn::GetAtt:
                - AckCluster
                - ClusterId
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
  # ==================== GlobalTrafficPolicy 网络隔离策略 ====================
  # 参考文档：production-doc/网络 & 安全组 限制.md
  # 仅使用 GlobalTrafficPolicy，通过 selector matchLabels 关联 OpenClaw Pod
  GlobalTrafficPolicyApplication:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn: AddonSleep
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      YamlContent: |
        apiVersion: network.alibabacloud.com/v1alpha1
        kind: GlobalTrafficPolicy
        metadata:
          name: openclaw-global-policy
        spec:
          egress:
            rules:
              - action: deny
                to:
                  - cidr: 100.100.100.200/32
              - action: allow
                to:
                  - service:
                      name: kube-dns
                      namespace: kube-system
              - action: deny
                to:
                  - cidr: 192.168.0.0/16
                  - cidr: 172.16.0.0/12
                  - cidr: 10.0.0.0/8
                  - cidr: 100.64.0.0/10
              - action: allow
                to:
                  - cidr: 0.0.0.0/0
          ingress:
            rules:
              - action: allow
                from:
                  - service:
                      name: sandbox-manager
                      namespace: sandbox-system
              - action: deny
                from:
                  - cidr: 0.0.0.0/0
          priority: 500
          selector:
            matchLabels:
              app: openclaw
  # ==================== OpenClaw SandboxSet ====================
  OpenClawSandboxSet:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn:
      - ClusterAppliaction
      - AddonSleep
      - GlobalTrafficPolicyApplication
    Properties:
      DefaultNamespace:
        Ref: SandboxNamespace
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: agents.kruise.io/v1alpha1
            kind: SandboxSet
            metadata:
              name: openclaw
              namespace: ${SandboxNamespace}
            spec:
              persistentContents:
                - filesystem
              replicas: ${OpenClawReplicas}
              runtimes:
                - name: agent-runtime
              template:
                metadata:
                  labels:
                    app: openclaw
                    alibabacloud.com/acs: "true"
                  annotations:
                    image.alibabacloud.com/enable-image-cache: "true"
                    network.alibabacloud.com/vswitch-ids: "${OpenClawVSwitchId1},${OpenClawVSwitchId2}"
                    network.alibabacloud.com/security-group-ids: "${OpenClawIsolationSecurityGroupId}"
                    network.alibabacloud.com/network-policy-mode: "traffic-policy"
                    network.alibabacloud.com/enable-network-policy-agent: "true"
                spec:
                  automountServiceAccountToken: false
                  enableServiceLinks: false
                  hostNetwork: false
                  hostPID: false
                  hostIPC: false
                  shareProcessNamespace: false
                  hostname: openclaw
                  containers:
                    - name: gateway
                      image: "${OpenClawImage}"
                      securityContext:
                        readOnlyRootFilesystem: false
                        runAsUser: 0
                        runAsGroup: 0
                      command: ["bash", "-c"]
                      args:
                        - "echo ${CmsGatewayStartScriptB64} | base64 -d | bash"
                      ports:
                        - name: gateway
                          containerPort: 18789
                          protocol: TCP
                        - name: runtime
                          containerPort: 49983
                          protocol: TCP
                      env:
                        - name: OPENCLAW_CONFIG_DIR
                          value: /root/.openclaw
                        - name: KUBERNETES_SERVICE_PORT_HTTPS
                          value: ""
                        - name: KUBERNETES_SERVICE_PORT
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP_PROTO
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP_ADDR
                          value: ""
                        - name: KUBERNETES_SERVICE_HOST
                          value: ""
                        - name: KUBERNETES_PORT
                          value: ""
                        - name: KUBERNETES_PORT_443_TCP_PORT
                          value: ""
                      resources:
                        requests:
                          cpu: 2
                          memory: 4Gi
                        limits:
                          cpu: 2
                          memory: 4Gi
                      startupProbe:
                        exec:
                          command:
                            - node
                            - -e
                            - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
                        initialDelaySeconds: 1
                        periodSeconds: 2
                        failureThreshold: 150
                  terminationGracePeriodSeconds: 1
          - SandboxNamespace:
              Ref: SandboxNamespace
            OpenClawReplicas:
              Ref: OpenClawReplicas
            OpenClawImage:
              Ref: OpenClawImage
            OpenClawVSwitchId1:
              Fn::If:
                - CreateNewVpcCondition
                - Fn::GetAtt:
                    - OpenClawVSwitch1
                    - VSwitchId
                - Ref: OpenClawVSwitchId1
            OpenClawVSwitchId2:
              Fn::If:
                - CreateNewVpcCondition
                - Fn::GetAtt:
                    - OpenClawVSwitch2
                    - VSwitchId
                - Ref: OpenClawVSwitchId2
            OpenClawIsolationSecurityGroupId:
              Fn::GetAtt:
                - OpenClawIsolationSecurityGroup
                - SecurityGroupId
            CmsGatewayStartScriptB64:
              Fn::Base64Encode:
                Fn::If:
                  - EnableCmsObservabilityCondition
                  - Fn::Sub:
                      - |
                        set -eu
                        # CMS 安装脚本（安装 openclaw-cms-plugin，自动写入 openclaw.json 配置）
                        wget -qO- https://arms-apm-cn-hangzhou-pre.oss-cn-hangzhou.aliyuncs.com/openclaw-cms-plugin/install-wget-nest.sh | bash -s -- --endpoint "${Endpoint}" --x-arms-license-key "${LicenseKey}" --x-arms-project "${ArmsProject}" --x-cms-workspace "${WorkspaceName}" --serviceName "${ServiceName}" || true
                        echo "=== Starting Gateway ==="
                        exec node openclaw.mjs gateway run --allow-unconfigured
                      - LicenseKey:
                          Fn::Jq:
                            - First
                            - .AuthToken
                            - Fn::GetAtt:
                                - CmsServiceObservability
                                - EntryPointInfo
                        ArmsProject:
                          Fn::Jq:
                            - First
                            - .Project
                            - Fn::GetAtt:
                                - CmsServiceObservability
                                - EntryPointInfo
                        WorkspaceName:
                          Ref: CmsWorkspaceName
                        ServiceName:
                          Ref: CmsServiceName
                        Endpoint:
                          Fn::Sub:
                            - 'https://${ArmsProject}.${RegionId}.log.aliyuncs.com/apm/trace/opentelemetry'
                            - RegionId:
                                Ref: ALIYUN::Region
                              ArmsProject:
                                Fn::Jq:
                                  - First
                                  - .Project
                                  - Fn::GetAtt:
                                      - CmsServiceObservability
                                      - EntryPointInfo
                  - |
                    exec node openclaw.mjs gateway run --allow-unconfigured
      WaitUntil:
        - Kind: SandboxSet
          ApiVersion: agents.kruise.io/v1alpha1
          Name: openclaw
          Namespace:
            Ref: SandboxNamespace
          JsonPath: $.status.availableReplicas
          Operator: NotEmpty
          Timeout: 600
          FirstMatch: true
  EditAlbConfigServiceAccount:
    Type: ALIYUN::CS::ClusterApplication
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: 'edit-alb-config-sa'
          namespace: "sandbox-system"
  EditAlbConfigRole:
    Type: ALIYUN::CS::ClusterApplication
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: 'edit-alb-config-role'
          namespace: "sandbox-system"
        rules:
        - apiGroups: ["alibabacloud.com"]
          resources: ["albconfigs"]
          verbs: ["get", "list", "update","patch"]
  EditAlbConfigBinding:
    Type: ALIYUN::CS::ClusterApplication
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: "edit-alb-config-rolebinding"
          namespace: "sandbox-system"
        subjects:
        - kind: ServiceAccount
          name: 'edit-alb-config-sa'
          namespace: "sandbox-system"
        roleRef:
          kind: ClusterRole
          name: 'edit-alb-config-role'
          apiGroup: rbac.authorization.k8s.io
  # ========== ALB Config Job（配置 HTTPS 443 监听器） ==========
  EditAlbConfigJob:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn:
      - AddonSleep
      - EditAlbConfigBinding
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace: sandbox-system
      YamlContent: |
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: edit-alb-config-job
        spec:
          template:
            metadata:
              name: edit-alb-config-job
            spec:
              serviceAccountName: edit-alb-config-sa
              restartPolicy: Never
              containers:
              - name: edit-alb-config-job
                image: compute-nest-registry.cn-hangzhou.cr.aliyuncs.com/public/dtzar/helm-kubectl:3.12.0
                command: [ "/bin/sh", "-c", "--" ]
                args:
                  - |
                    set -x
                    echo "开始修改 AlbConfig 资源：alb"
                    kubectl patch albconfig.alibabacloud.com alb --type='json' -p='[{"op":"add","path":"/spec/listeners/-","value":{"port":443,"protocol":"HTTPS","requestTimeout":600}}]'
  # ========== 测试 Pod ==========
  TestPod:
    Type: ALIYUN::CS::ClusterApplication
    DependsOn:
      - OpenClawSandboxSet
    Properties:
      ClusterId:
        Fn::GetAtt:
          - AckCluster
          - ClusterId
      DefaultNamespace:
        Ref: SandboxNamespace
      YamlContent:
        Fn::Sub:
          - |
            apiVersion: v1
            kind: Pod
            metadata:
              name: acs-sandbox-test-pod
              namespace: ${SandboxNamespace}
              labels:
                app: acs-sandbox-test-pod
                alibabacloud.com/acs: "true"
            spec:
              nodeSelector:
                type: virtual-kubelet
              tolerations:
                - key: virtual-kubelet.io/provider
                  operator: Exists
                  effect: NoSchedule
              containers:
                - name: acs-sandbox-test-pod
                  image: {{ computenest::acrimage::acs-sandbox-test-pod }}
                  imagePullPolicy: Always
                  env:
                    - name: E2B_API_KEY
                      value: ${AdminApiKey}
                    - name: E2B_DOMAIN
                      value: ${E2BDomainAddress}
                    - name: SSL_CERT_FILE
                      value: "${TLSCert}"
              restartPolicy: Never
          - SandboxNamespace:
              Ref: SandboxNamespace
            AdminApiKey:
              Ref: AdminApiKey
            E2BDomainAddress:
              Ref: E2BDomainAddress
            TLSCert:
              Ref: TLSCert
  # ========== PrivateZone — NewVPC 场景：创建全新 Zone ==========
  PrivateZone:
    Condition: EnablePrivateZoneForNewVpcCondition
    Type: ALIYUN::PVTZ::Zone
    DependsOn: Vpc
    Properties:
      ProxyPattern: ZONE
      ZoneName:
        Ref: E2BDomainAddress
  PrivateZoneVpcBinder:
    Condition: EnablePrivateZoneForNewVpcCondition
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    Properties:
      Vpcs:
        - RegionId:
            Ref: ALIYUN::Region
          VpcId:
            Fn::GetAtt:
              - Vpc
              - VpcId
      ZoneId:
        Fn::GetAtt:
          - PrivateZone
          - ZoneId
  PrivateZoneCnameRecord:
    Condition: EnablePrivateZoneForNewVpcCondition
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn:
      - PrivateZoneVpcBinder
      - AlbDataSource
    Properties:
      ZoneId:
        Fn::GetAtt:
          - PrivateZone
          - ZoneId
      Rr: '*'
      Type: CNAME
      Value:
        Fn::Jq:
          - First
          - '.[0].DNSName'
          - Fn::GetAtt:
              - AlbDataSource
              - LoadBalancers
  # ========== PrivateZone — ExistingVPC + 无同名 Zone：创建新 Zone + 绑定 VPC + CNAME ==========
  # 通过 Locals DATASOURCE::PVTZ::Zones 查询账号下所有 Zone，Eval 计算是否有同名 Zone
  # ExistingVpcNeedNewZoneCondition = EnablePrivateZone=true AND ExistingVPC AND 无同名 Zone
  PrivateZoneForExistingVpc:
    Condition: ExistingVpcNeedNewZoneCondition
    Type: ALIYUN::PVTZ::Zone
    Properties:
      ProxyPattern: ZONE
      ZoneName:
        Ref: E2BDomainAddress
  PrivateZoneVpcBinderForExistingVpc:
    Condition: ExistingVpcNeedNewZoneCondition
    Type: ALIYUN::PVTZ::ZoneVpcBinder
    Properties:
      Vpcs:
        - RegionId:
            Ref: ALIYUN::Region
          VpcId:
            Ref: VpcId
      ZoneId:
        Fn::GetAtt:
          - PrivateZoneForExistingVpc
          - ZoneId
  ExistingVpcNewZoneCnameRecord:
    Condition: ExistingVpcNeedNewZoneCondition
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn:
      - PrivateZoneVpcBinderForExistingVpc
      - AlbDataSource
    Properties:
      ZoneId:
        Fn::GetAtt:
          - PrivateZoneForExistingVpc
          - ZoneId
      Rr: '*'
      Type: CNAME
      Value:
        Fn::Jq:
          - First
          - '.[0].DNSName'
          - Fn::GetAtt:
              - AlbDataSource
              - LoadBalancers
  # ========== PrivateZone — ExistingVPC + 已有同名 Zone：复用已有 ZoneId ==========
  # ExistingVpcReuseZoneCondition = EnablePrivateZone=true AND ExistingVPC AND 有同名 Zone
  # ZoneId 来自 Locals 中的 ExistingPrivateZoneId（通过 Fn::Jq 从 DATASOURCE 查询结果提取）
  # 因为 ExistingVpcZonesLocal 已通过 VpcId 过滤，查到的 Zone 一定已绑定该 VPC
  # 所以无需再执行 ZoneVpcBinder，直接添加 CNAME 记录即可
  ExistingVpcReuseZoneCnameRecord:
    Condition: ExistingVpcReuseZoneCondition
    Type: ALIYUN::PVTZ::ZoneRecord
    DependsOn:
      - AlbDataSource
    Properties:
      ZoneId:
        Ref: ExistingPrivateZoneId
      Rr: '*'
      Type: CNAME
      Value:
        Fn::Jq:
          - First
          - '.[0].DNSName'
          - Fn::GetAtt:
              - AlbDataSource
              - LoadBalancers
Outputs:
  ALB_DNS_Name:
    Label:
      zh-cn: ALB 访问端点
      en: ALB DNS Name
    Value:
      Fn::Jq:
        - First
        - '.[0].DNSName'
        - Fn::GetAtt:
            - AlbDataSource
            - LoadBalancers
  ACK控制台地址:
    Value:
      Fn::Sub:
        - "https://cs.console.aliyun.com/#/k8s/cluster/${ClusterId}/v2/workload/pod?ns=sandbox-system"
        - ClusterId:
            Fn::GetAtt:
              - AckCluster
              - ClusterId
  ClusterId:
    Label:
      zh-cn: 集群ID
      en: Cluster ID
    Description:
      zh-cn: ACK集群ID，用于获取kubeconfig
      en: ACK Cluster ID for kubeconfig retrieval
    Value:
      Fn::GetAtt:
        - AckCluster
        - ClusterId
  VpcId:
    Label:
      zh-cn: VPC ID
      en: VPC ID
    Value:
      Fn::If:
        - CreateNewVpcCondition
        - Fn::GetAtt:
            - Vpc
            - VpcId
        - Ref: VpcId
  ClusterSecurityGroupId:
    Label:
      zh-cn: ACK 集群安全组ID
      en: ACK Cluster SecurityGroup ID
    Description:
      zh-cn: ACK 集群安全组ID（ACK 自动创建，通过 ClusterDataSource 查询）
      en: SecurityGroup ID for ACK cluster (auto-created by ACK, queried via ClusterDataSource)
    Value:
      Fn::GetAtt:
        - ClusterDataSource
        - SecurityGroupId
  OpenClawIsolationSecurityGroupId:
    Label:
      zh-cn: OpenClaw Pod 隔离安全组ID
      en: OpenClaw Pod Isolation SecurityGroup ID
    Description:
      zh-cn: OpenClaw Pod 隔离安全组ID（enterprise类型，通过 annotation 关联，实现 Pod 间网络隔离）
      en: SecurityGroup ID for OpenClaw Pod isolation (enterprise type, associated via annotation)
    Value:
      Fn::GetAtt:
        - OpenClawIsolationSecurityGroup
        - SecurityGroupId
  E2B_API_KEY:
    Label: Sandbox API 访问密钥
    Value:
      Ref: AdminApiKey
    NoEcho: true
  E2B_DOMAIN:
    Label: Sandbox 访问域名
    Value:
      Ref: E2BDomainAddress
  OpenClawNatGatewayId:
    Condition: EnableOpenClawNatCondition
    Label:
      zh-cn: OpenClaw 独立 NAT 网关ID
      en: OpenClaw NAT Gateway ID
    Description:
      zh-cn: OpenClaw Sandbox Pod 使用的独立 NAT 网关ID
      en: Dedicated NAT Gateway ID for OpenClaw Sandbox Pods
    Value:
      Fn::GetAtt:
        - OpenClawNatGateway
        - NatGatewayId
  OpenClawNatEipAddress:
    Condition: EnableOpenClawNatCondition
    Label:
      zh-cn: OpenClaw NAT 网关 EIP 地址
      en: OpenClaw NAT Gateway EIP Address
    Description:
      zh-cn: OpenClaw 独立 NAT 网关绑定的公网 IP 地址
      en: Public IP address bound to OpenClaw dedicated NAT Gateway
    Value:
      Fn::GetAtt:
        - OpenClawNatEip
        - EipAddress
  ApiServerIntranetIp:
    Label:
      zh-cn: API Server 内网 IP
      en: API Server Intranet IP
    Description:
      zh-cn: 集群 API Server 的内网 IP 地址（动态获取）
      en: Intranet IP address of cluster API Server (dynamically retrieved)
    Value:
      Fn::Jq:
        - First
        - '.intranet_api_server_endpoint | capture("https?://(?<ip>[0-9.]+)") | .ip'
        - Fn::GetAtt:
            - ClusterDataSource
            - MasterUrl
  DefaultNatGatewayIp:
    Label:
      zh-cn: 集群默认 NAT 网关内网 IP
      en: Default NAT Gateway Intranet IP
    Description:
      zh-cn: 集群默认 NAT 网关的内网 IP 地址（动态获取，用于安全组 upstream 规则）
      en: Intranet IP of cluster default NAT Gateway (dynamically retrieved, used for SecurityGroup upstream rules)
    Value:
      Fn::Jq:
        - First
        - 'map(select(.Name | test("^openclaw") | not)) | .[0].NatGatewayPrivateInfo.PrivateIpAddress'
        - Fn::GetAtt:
            - DefaultNatGatewayDataSource
            - NatGateways
